<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIX 監控儀表板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .container { width: 100%; max-width: 800px; }
    .card-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    .card { background: #161616; border: 1px solid #222; border-radius: 12px; padding: 20px; text-align: center; }
    .label { font-size: 0.9rem; color: #888; margin-bottom: 10px; }
    .price { font-size: 3rem; font-weight: bold; }
    .us { color: #f0c040; } /* 美股金色 */
    .tw { color: #40a0f0; } /* 台股藍色 */
    
    /* 嵌入圖表的容器 */
    .iframe-container { 
      width: 100%; 
      height: 450px; 
      background: #161616; 
      border-radius: 12px; 
      overflow: hidden; 
      border: 1px solid #222;
      margin-top: 20px;
    }
    iframe { width: 100%; height: 100%; border: none; }
    
    canvas { background: #161616; border-radius: 12px; padding: 10px; border: 1px solid #222; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <div class="card-row">
      <div class="card">
        <div class="label">CBOE VIX (美股)</div>
        <div id="p-us" class="price us">--</div>
      </div>

      <div class="card">
        <div class="label">VIXTWN (台股)</div>
        <div id="p-tw" class="price tw">--</div>
      </div>
    </div>

    <div class="label" style="margin-top:20px;">台股 VIX 即時走勢 (來源: 玩股網)</div>
    <div class="iframe-container">
      <iframe src="https://www.wantgoo.com/index/vixtwn/chart" scrolling="no"></iframe>
    </div>

    <div class="label" style="margin-top:30px;">美股 VIX 90日趨勢</div>
    <canvas id="vixChart"></canvas>
  </div>

<script>
  const WORKER_URL = "https://dashboard.jou0914.workers.dev";
  
  // 1. 更新數值邏輯
  async function updatePrices() {
    // 抓美股
    fetch(`${WORKER_URL}/vix`).then(r => r.json()).then(d => {
      document.getElementById("p-us").textContent = d.price.toFixed(2);
      updateChart(d.history);
    });

    // 抓台股 (我們改用直接呼叫，不再設預設值)
    fetch(`${WORKER_URL}/vixtw`).then(r => r.json()).then(d => {
      if(d.price) document.getElementById("p-tw").textContent = d.price.toFixed(2);
    });
  }

  // 2. 原本的美股 Chart.js 圖表邏輯 (省略重複代碼)
  const ctx = document.getElementById("vixChart").getContext("2d");
  const chart = new Chart(ctx, { /* ... 您原本的 chart 配置 ... */ });
  
  function updateChart(history) {
    chart.data.labels = history.map(h => h.date);
    chart.data.datasets[0].data = history.map(h => h.price);
    chart.update();
  }

  updatePrices();
  setInterval(updatePrices, 60000); // 每分鐘更新一次
</script>
</body>
</html>
