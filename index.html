<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Financial Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --accent: #38bdf8; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; position: relative; }
        .val { font-size: 1.5rem; font-weight: bold; margin: 5px 0; }
        .change { font-size: 0.9rem; }
        .up { color: #f87171; } .down { color: #4ade80; } /* 台股習慣：紅漲綠跌 */
        .warning { font-size: 0.75rem; color: #fbbf24; margin-top: 4px; display: block; }
        canvas { width: 100% !important; height: 50px !important; margin-top: 10px; }
        .btn-group { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { background: var(--accent); border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .copy-log { background: #64748b; color: white; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

<div class="grid" id="dashboard">
    <div class="card">
        <div>7769 鴻勁</div>
        <div class="val" id="price-7769">--</div>
        <div class="change" id="change-7769">--</div>
        <canvas id="chart-7769"></canvas>
    </div>

    <div class="card">
        <div>台股大盤指數</div>
        <div class="val" id="price-tws">--</div>
        <div class="change" id="change-tws">--</div>
        <canvas id="chart-tws"></canvas>
    </div>

    <div class="card">
        <div>道瓊期 (YM)</div>
        <div class="val" id="price-ym">--</div>
        <div class="change" id="change-ym">--</div>
        <canvas id="chart-ym"></canvas>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between;">
            <span>台幣 (USD/TWD)</span>
            <span>日幣 (USD/JPY)</span>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <div class="val" id="price-twd">--</div>
            <div class="val" id="price-jpy">--</div>
        </div>
        <div id="warn-jpy" class="warning"></div>
        <canvas id="chart-fx"></canvas>
    </div>

    <div class="card">
        <div>黃金 (國際盎司/克/錢)</div>
        <div class="val" id="gold-oz">--</div>
        <div class="change" id="gold-calc">--</div>
        <canvas id="chart-gold"></canvas>
    </div>

    <div class="card">
        <div>美股 VIX</div>
        <div class="val" id="price-vix">--</div>
        <div id="warn-vix" class="warning"></div>
        <canvas id="chart-vix"></canvas>
    </div>

    <div class="card">
        <div>布蘭特原油 (Brent)</div>
        <div class="val" id="price-oil">--</div>
        <canvas id="chart-oil"></canvas>
    </div>

    <div class="card">
        <div>加密貨幣恐慌指數</div>
        <div class="val" id="crypto-fear">--</div>
        <div id="warn-crypto" class="warning"></div>
    </div>
</div>

<div class="btn-group">
    <button onclick="refreshData()">REFRESH</button>
    <button onclick="window.open('https://www.edition.cnn.com/markets/fear-and-greed', '_blank')">CNN 恐慌指數按鈕</button>
    <button onclick="window.open('https://www.wantgoo.com/index/vixtwn', '_blank')">台股 VIX 網頁</button>
</div>

<button class="copy-log" onclick="copyLog()">一鍵複製 Log 功能</button>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyNlJGWxjsAK-uX34PxvTT3nFaezansCwcL9a7dvGS9ccOsFW8IviPc59WlVKshS9DzQg/exec";
const ALPHA_KEY = "12F9YHGH3T1063OB";
const FINNHUB_KEY = "d76gjvpr01qm4b7u6gj0d76gjvpr01qm4b7u6gjg";

let logData = "";

// 曲線繪製函式
function renderSparkline(canvasId, dataPoints) {
    const ctx = document.getElementById(canvasId).getContext('2d');
    if (window[canvasId] instanceof Chart) { window[canvasId].destroy(); }
    
    window[canvasId] = new Chart(ctx, {
        type: 'line',
        data: {
            labels: dataPoints.map((_, i) => i),
            datasets: [{
                data: dataPoints,
                borderColor: '#38bdf8',
                borderWidth: 2,
                pointRadius: 0,
                fill: false,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { display: false }, y: { display: false } }
        }
    });
}

async function refreshData() {
    try {
        // 強化容錯：使用 Promise.allSettled 確保個別 API 失敗不卡死全部
        const [gasRes, cryptoRes] = await Promise.allSettled([
            fetch(GAS_URL).then(r => r.json()),
            fetch('https://api.alternative.me/fng/').then(r => r.json())
        ]);

        if (gasRes.status === 'fulfilled') {
            const d = gasRes.value;
            logData = JSON.stringify(d, null, 2);

            // 1. 7769 鴻勁
            updateUI('7769', d.h7769, d.h7769_hist);
            // 2. 台股大盤
            updateUI('tws', d.tws, d.tws_hist);
            // 3. 道瓊期
            updateUI('ym', d.ym, d.ym_hist);
            // 4 & 5. 匯率 (台幣/日幣)
            document.getElementById('price-twd').innerText = d.twd;
            document.getElementById('price-jpy').innerText = d.jpy;
            document.getElementById('warn-jpy').innerText = d.jpy > 159.5 ? "⚠️ 日幣 > 159.5" : "";
            renderSparkline('chart-fx', d.fx_hist || []);

            // 6. 黃金計算邏輯
            const goldPrice = parseFloat(d.gold);
            const twdRate = parseFloat(d.twd);
            const pricePerGram = (goldPrice * twdRate) / 31.1035;
            const pricePerQian = pricePerGram * 3.75;
            document.getElementById('gold-oz').innerText = `$${goldPrice}`;
            document.getElementById('gold-calc').innerText = `NT$${pricePerGram.toFixed(1)}/g | NT$${pricePerQian.toFixed(0)}/錢`;
            renderSparkline('chart-gold', d.gold_hist || []);

            // 7. 美股 VIX
            document.getElementById('price-vix').innerText = d.vix;
            document.getElementById('warn-vix').innerText = d.vix > 30 ? "⚠️ 美股 VIX > 30" : "";
            renderSparkline('chart-vix', d.vix_hist || []);

            // 8. 原油
            document.getElementById('price-oil').innerText = `$${d.oil}`;
            renderSparkline('chart-oil', d.oil_hist || []);
        }

        // 加密貨幣恐慌指數
        if (cryptoRes.status === 'fulfilled') {
            const fng = cryptoRes.value.data[0].value;
            document.getElementById('crypto-fear').innerText = fng;
            document.getElementById('warn-crypto').innerText = fng < 10 ? "⚠️ 極度恐慌 < 10" : "";
        }

    } catch (e) {
        console.error("Data Refresh Error", e);
    }
}

function updateUI(id, val, hist) {
    document.getElementById(`price-${id}`).innerText = val || '--';
    if (hist && hist.length > 0) {
        renderSparkline(`chart-${id}`, hist);
    }
}

function copyLog() {
    navigator.clipboard.writeText(logData);
    alert("Log 已複製到剪貼簿");
}

// 初始化
refreshData();
</script>

</body>
</html>
