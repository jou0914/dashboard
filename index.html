<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7769 戰情室 v3.6</title>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --bg: #121212; --card: #1c1c1e; --text: #e0e0e0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .version-bar { width: 100%; max-width: 380px; display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px solid #333; }
        .version-tag { font-size: 11px; color: #f1c40f; font-weight: bold; }
        .dashboard { width: 100%; max-width: 380px; display: grid; gap: 12px; }
        .card { background: var(--card); padding: 18px; border-radius: 16px; border-left: 5px solid #444; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .card.up { border-left-color: var(--red); }
        .card.down { border-left-color: var(--green); }
        .main-val { font-size: 2.6rem; font-weight: 800; margin: 3px 0; letter-spacing: -1px; }
        .cnn-card { border-left-color: #f1c40f; text-align: center; }
        .gauge-container { position: relative; width: 240px; height: 130px; margin: 10px auto 0; }
        #cnnGauge { width: 240px; height: 130px; }
        #cnnValueText { font-size: 2.8rem; font-weight: bold; position: absolute; bottom: 5px; width: 100%; text-align: center; }
        #cnnStatusText { font-size: 0.9rem; color: #f1c40f; margin-top: 8px; font-weight: bold; }
        .btn-refresh { background: #3367d6; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; font-size: 16px; }
        .log-container { width: 100%; max-width: 360px; margin-top: 15px; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .log-header { background: #222; color: #aaa; padding: 6px 12px; font-size: 11px; display: flex; justify-content: space-between; }
        #log-window { background: #000; padding: 12px; font-family: 'Consolas', monospace; font-size: 10px; color: #00ff00; height: 160px; overflow-y: auto; white-space: pre-wrap; line-height: 1.4; }
        .btn-copy-log { background: #444; color: #fff; border: none; padding: 3px 8px; border-radius: 4px; font-size: 9px; cursor: pointer; }
    </style>
</head>
<body>

<div class="version-bar">
    <span class="version-tag">SYSTEM v3.6 MONITOR</span>
    <span id="lastUpdate" style="font-size: 10px; color: #888;">等待同步...</span>
</div>

<div class="dashboard">
    <div id="card-7769" class="card"><div class="label" style="font-size:12px;color:#888;">鴻勁 (7769.TW)</div><div id="p-7769" class="main-val">--.--</div></div>
    <div id="card-vix" class="card"><div class="label" style="font-size:12px;color:#888;">美股恐慌指數 (VIX)</div><div id="p-vix" class="main-val" style="color:#f1c40f;">--.--</div></div>
    <div class="card cnn-card">
        <div class="label" style="font-size:12px;color:#888;">CNN Fear & Greed Index</div>
        <div class="gauge-container"><canvas id="cnnGauge"></canvas><div id="cnnValueText">--</div></div>
        <div id="cnnStatusText">ANALYZING...</div>
    </div>
    <button class="btn-refresh" onclick="updateAll()">FORCE REFRESH</button>
</div>

<div class="log-container">
    <div class="log-header"><span>JSON TRAFFIC MONITOR</span><button class="btn-copy-log" onclick="copyLog()">COPY LOG</button></div>
    <div id="log-window"><div id="log-content">Initializing...</div></div>
</div>

<script>
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyNlJGWxjsAK-uX34PxvTT3nFaezansCwcL9a7dvGS9ccOsFW8IviPc59WlVKshS9DzQg/exec';

    function addLog(type, msg) {
        const content = document.getElementById('log-content');
        const timestamp = new Date().toLocaleTimeString();
        const icon = { 'info': '⚙️', 'success': '✅', 'error': '❌', 'warn': '⚠️', 'raw': '📄' }[type];
        content.innerHTML = `[${timestamp}] ${icon} ${msg}\n` + content.innerHTML;
    }

    function copyLog() {
        const text = document.getElementById('log-content').innerText;
        navigator.clipboard.writeText(text).then(() => alert('Log copied!'));
    }

    function drawGauge(value) {
        const canvas = document.getElementById('cnnGauge');
        const ctx = canvas.getContext('2d');
        canvas.width = 480; canvas.height = 260; ctx.scale(2, 2);
        ctx.clearRect(0, 0, 240, 130);
        ctx.beginPath(); ctx.arc(120, 120, 100, Math.PI, 0); ctx.lineWidth = 18; ctx.strokeStyle = '#2a2a2e'; ctx.stroke();
        if (value !== null) {
            const grad = ctx.createLinearGradient(20, 0, 220, 0);
            grad.addColorStop(0, '#ff4d4d'); grad.addColorStop(0.5, '#f1c40f'); grad.addColorStop(1, '#2ecc71');
            ctx.beginPath(); const endAngle = Math.PI + (Math.PI * (value / 100));
            ctx.arc(120, 120, 100, Math.PI, endAngle); ctx.strokeStyle = grad; ctx.stroke();
            ctx.save(); ctx.translate(120, 120); ctx.rotate(endAngle); ctx.beginPath();
            ctx.moveTo(0, -4); ctx.lineTo(95, 0); ctx.lineTo(0, 4); ctx.fillStyle = '#fff'; ctx.fill(); ctx.restore();
        }
    }

    async function updateAll() {
        addLog('info', 'Connecting to Proxy...');
        try {
            const res = await fetch(PROXY_URL);
            const rawText = await res.text();
            const data = JSON.parse(rawText);
            
            addLog('success', 'Packet Received.');
            addLog('raw', `Available Keys: [${Object.keys(data).join(', ')}]`);
            
            // 7769
            const twKey = Object.keys(data).find(k => k.includes("7769"));
            if (twKey) {
                const p = data[twKey].chart.result[0].meta.regularMarketPrice;
                document.getElementById('p-7769').innerText = p.toFixed(2);
                addLog('info', `Stock 7769: ${p}`);
            }

            // VIX
            const vixKey = Object.keys(data).find(k => k.toUpperCase().includes("VIX"));
            if (vixKey) {
                const v = data[vixKey].chart.result[0].meta.regularMarketPrice;
                document.getElementById('p-vix').innerText = v.toFixed(2);
                addLog('info', `VIX Index: ${v}`);
            }

            // CNN Debugging
            const cnnKey = Object.keys(data).find(k => k.toLowerCase().includes("cnn"));
            if (cnnKey) {
                const cnnObj = data[cnnKey];
                if (cnnObj.fear_and_greed || (Array.isArray(cnnObj) && cnnObj.length > 0)) {
                    let score = cnnObj.fear_and_greed ? Math.round(cnnObj.fear_and_greed.score) : Math.round(cnnObj[cnnObj.length-1].y);
                    let rating = cnnObj.fear_and_greed ? cnnObj.fear_and_greed.rating : cnnObj[cnnObj.length-1].rating;
                    document.getElementById('cnnValueText').innerText = score;
                    document.getElementById('cnnStatusText').innerText = rating.toUpperCase();
                    drawGauge(score);
                    addLog('success', `CNN Parsed: ${score}`);
                } else {
                    addLog('warn', `CNN Key exists but structure is empty: ${JSON.stringify(cnnObj)}`);
                }
            } else {
                addLog('error', 'CNN Key MISSING in JSON!');
                addLog('raw', `Full JSON Payload Snapshot: ${rawText.substring(0, 300)}...`);
            }
            
            document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString();
        } catch (e) {
            addLog('error', `Critical Failure: ${e.message}`);
        }
    }

    drawGauge(null);
    updateAll();
</script>
</body>
</html>
