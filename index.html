<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市場監控 v1.6.0</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .ver { width: 100%; text-align: right; font-size: 10px; color: #444; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; text-align: center; }
        .full { grid-column: span 2; }
        .label { font-size: 11px; color: #666; margin-bottom: 5px; font-weight: bold; }
        .price { font-size: 2.2rem; font-weight: bold; }
        .cnn-c { color: #ff4d4d; } .vix-c { color: #f0c040; } .tw-c { color: #40a0f0; } .twd-c { color: #a084ff; } .s-c { color: #48bb78; }
        #debug-panel { margin-top: 20px; background: #080808; border: 1px solid #1a1a1a; padding: 10px; font-family: monospace; font-size: 10px; width: 100%; box-sizing: border-box; }
        .log-err { color: #ff4d4d; } .log-ok { color: #48bb78; }
    </style>
</head>
<body>
<div class="container">
    <div class="ver">VER 1.6.0</div>
    <div class="grid">
        <div class="card full"><div class="label">CNN Fear & Greed</div><div id="p-cnn" class="price cnn-c">--</div></div>
        <div class="card"><div class="label">VIX (US)</div><div id="p-vix" class="price vix-c">--</div></div>
        <div class="card"><div class="label">VIX (TW)</div><div id="p-vtw" class="price tw-c">--</div></div>
        <div class="card"><div class="label">USD / TWD</div><div id="p-twd" class="price twd-c">--</div></div>
        <div class="card"><div class="label">7769 (鴻勁)</div><div id="p-7769" class="price s-c">--</div></div>
    </div>
    <div id="debug-panel"><div id="log-content">Initializing v1.6.0...</div></div>
</div>
<script>
    const API = "https://dashboard.jou0914.workers.dev";
    const logEl = document.getElementById('log-content');
    const addLog = (m, t='ok') => { logEl.innerHTML = `<div class="log-${t}">[${new Date().toLocaleTimeString()}] ${m}</div>` + logEl.innerHTML; };

    async function refresh() {
        const fetchItem = async (path, id, fix = 2) => {
            try {
                const res = await fetch(`${API}${path}`);
                const d = await res.json();
                if (d.price) {
                    document.getElementById(id).textContent = (id === 'p-7769') ? d.price.toLocaleString() : d.price.toFixed(fix);
                    addLog(`${path} OK`);
                } else {
                    document.getElementById(id).textContent = "--";
                    addLog(`${path} ERR: ${d.error || 'Empty'}`, 'err');
                }
            } catch (e) { addLog(`${path} CRITICAL`, 'err'); }
        };
        logEl.innerHTML = "";
        await Promise.all([ fetchItem('/cnn', 'p-cnn', 0), fetchItem('/vix', 'p-vix'), fetchItem('/vixtw', 'p-vtw'), fetchItem('/twd', 'p-twd', 3), fetchItem('/7769', 'p-7769') ]);
    }
    refresh(); setInterval(refresh, 60000);
</script>
</body>
</html>
