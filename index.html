<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球投資戰情室 v11 Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Noto+Sans+TC:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --red:#ff4d6d;
    --green:#00e676;
    --bg:#05070d;
    --card:rgba(15,20,30,0.7);
    --text:#e6edf3;
    --muted:#7f8da3;
    --blue:#3ea6ff;
    --gold:#f7c948;
    --border:rgba(255,255,255,0.08);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family:'Noto Sans TC';
    background:radial-gradient(circle at 20% 0%,#0a0f1f,#05070d 70%);
    color:var(--text);
    padding:16px;
}

.header{
    max-width:900px;margin:auto;
    display:flex;justify-content:space-between;align-items:center;
}

.header-title{font-family:'Rajdhani';font-size:22px}
.header-sub{font-size:10px;color:var(--muted)}

.dashboard{
    max-width:900px;margin:10px auto;
    display:grid;grid-template-columns:1fr 1fr;gap:10px;
}

@media(min-width:600px){
.dashboard{grid-template-columns:repeat(4,1fr)}
}

.card{
    background:var(--card);
    backdrop-filter:blur(14px);
    border-radius:16px;
    border:1px solid var(--border);
    padding:14px;
    box-shadow:0 10px 30px rgba(0,0,0,.6);
    transition:.25s;
}

.card:hover{transform:translateY(-3px)}
.card.up{box-shadow:0 0 20px rgba(255,80,80,.2)}
.card.down{box-shadow:0 0 20px rgba(0,230,118,.2)}

.label{font-size:10px;color:var(--muted)}

.main-val{
    font-family:'Rajdhani';
    font-size:1.8rem;
    margin-top:6px;
}

.sub-val{font-size:11px;margin-top:4px}

.section-label{
    grid-column:1/-1;
    font-size:11px;
    letter-spacing:3px;
    color:var(--muted);
}

.chart-container{height:50px}

.fng{
    grid-column:1/-1;
    text-align:center;
    padding:20px;
    background:linear-gradient(135deg,#0c1220,#0a0f1a);
    border-radius:16px;
}

#fngValue{font-size:3rem}

button{
    width:100%;padding:12px;
    border:none;border-radius:10px;
    background:var(--blue);color:#fff;
}

</style>
</head>

<body>

<div class="header">
<div>
<div class="header-title">戰情室 v11</div>
<div id="time" class="header-sub"></div>
</div>
<div class="header-sub">● LIVE</div>
</div>

<div class="dashboard">

<div class="section-label">台股</div>
<div class="card"><div class="label">加權指數</div><div id="twii" class="main-val">--</div></div>
<div class="card"><div class="label">日經</div><div id="n225" class="main-val">--</div></div>
<div class="card"><div class="label">韓國</div><div id="ks11" class="main-val">--</div></div>
<div class="card"><div class="label">鴻勁</div><div id="s7769" class="main-val">--</div></div>

<div class="section-label">美股</div>
<div class="card"><div class="label">道瓊期</div><div id="ym" class="main-val">--</div></div>
<div class="card"><div class="label">原油</div><div id="oil" class="main-val">--</div></div>
<div class="card"><div class="label">VIX</div><div id="vix" class="main-val">--</div></div>

<div class="section-label">外匯</div>
<div class="card"><div class="label">USD/TWD</div><div id="twd" class="main-val">--</div></div>
<div class="card"><div class="label">USD/JPY</div><div id="jpy" class="main-val">--</div></div>

<div class="section-label">情緒</div>
<div class="fng">
<div>Fear & Greed</div>
<div id="fngValue">--</div>
<button onclick="updateAll()">Refresh</button>
</div>

</div>

<script>
const API='https://script.google.com/macros/s/AKfycbyNlJGWxjsAK-uX34PxvTT3nFaezansCwcL9a7dvGS9ccOsFW8IviPc59WlVKshS9DzQg/exec';

function updateTime(){
document.getElementById('time').innerText=new Date().toLocaleString();
}
setInterval(updateTime,1000);

async function updateAll(){
try{
let res=await fetch(API);
let data=await res.json();

function set(id,val){document.getElementById(id).innerText=val}

set('twii',data.stock_twii?.chart?.result?.[0]?.meta?.regularMarketPrice||'--');
set('n225',data.stock_n225?.chart?.result?.[0]?.meta?.regularMarketPrice||'--');
set('ks11',data.stock_ks11?.chart?.result?.[0]?.meta?.regularMarketPrice||'--');
set('s7769',data.stock_7769?.chart?.result?.[0]?.meta?.regularMarketPrice||'--');
set('ym',data.stock_ym?.chart?.result?.[0]?.meta?.regularMarketPrice||'--');
set('oil',data.oil_brent?.chart?.result?.[0]?.meta?.regularMarketPrice||'--');
set('vix',data.vix_index?.chart?.result?.[0]?.meta?.regularMarketPrice||'--');
set('twd',data.usd_twd?.chart?.result?.[0]?.meta?.regularMarketPrice||'--');
set('jpy',data.usd_jpy?.chart?.result?.[0]?.meta?.regularMarketPrice||'--');

let fng=data.crypto_fng?.data?.[0]?.value;
if(fng) document.getElementById('fngValue').innerText=fng;

}catch(e){console.log(e)}
}

updateAll();
setInterval(updateAll,300000);
</script>

</body>
</html>
