<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7769 投資戰情室 v2.3</title>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --bg: #121212; --card: #1c1c1e; --text: #e0e0e0; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .dashboard { width: 100%; max-width: 380px; display: grid; gap: 12px; }
        
        .card { background: var(--card); padding: 18px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border-left: 5px solid #333; }
        .card.up { border-left-color: var(--red); }
        .card.down { border-left-color: var(--green); }
        
        .label { font-size: 12px; color: #888; font-weight: 600; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .main-val { font-size: 2.6rem; font-weight: 800; margin: 3px 0; letter-spacing: -1px; }
        .sub-val { font-size: 1rem; font-weight: 600; }
        
        /* CNN 區塊：改用 M平方嵌入 */
        .cnn-card { border-left: 5px solid #f1c40f; padding: 10px; }
        .cnn-container { 
            width: 100%; 
            height: 220px; /* 增加高度以容納 M平方圖表 */
            overflow: hidden; 
            margin-top: 5px; 
            background: #fff; /* M平方背景為白色，我們做一點濾鏡處理 */
            border-radius: 12px; 
            position: relative;
        }
        /* 利用 iframe 嵌入 M平方網頁 */
        #cnn-frame {
            width: 100%;
            height: 450px; /* 內部長度 */
            border: none;
            transform: scale(0.8); /* 縮放以符合手機寬度 */
            transform-origin: 0 0;
            margin-top: -165px; /* 向上推，只鎖定指針圖區域 */
            margin-left: 5px;
        }

        .btn-refresh { background: #3367d6; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 8px; width: 100%; font-size: 15px; }
        #log-window { width: 100%; max-width: 360px; margin-top: 15px; background: #000; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 10px; color: #555; height: 80px; overflow-y: auto; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="card-7769" class="card">
        <div class="label"><span>鴻勁 (7769.TW)</span></div>
        <div id="p-7769" class="main-val">--.--</div>
        <div id="diff-7769" class="sub-val">--.-- (--%)</div>
    </div>

    <div id="card-vix" class="card">
        <div class="label"><span>美股恐慌指數 (VIX)</span></div>
        <div id="p-vix" class="main-val" style="color: #f1c40f;">--.--</div>
        <div id="status-vix" class="sub-val" style="color: #888;">市場情緒監控中...</div>
    </div>

    <div class="card cnn-card">
        <div class="label" style="justify-content: center;">CNN Fear & Greed (MacroMicro)</div>
        <div class="cnn-container">
            <iframe id="cnn-frame" src="https://www.macromicro.me/series/22748/cnn-fear-and-greed" scrolling="no"></iframe>
        </div>
        <div style="font-size: 11px; margin-top: 8px; color: #f1c40f; text-align: center;">數據來源：財經M平方</div>
    </div>

    <button class="btn-refresh" onclick="updateAll()">更新全球市場數據</button>
</div>

<div id="log-window"><div id="log-content">系統初始化中...</div></div>

<script>
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyNlJGWxjsAK-uX34PxvTT3nFaezansCwcL9a7dvGS9ccOsFW8IviPc59WlVKshS9DzQg/exec';

    function addLog(msg) {
        const content = document.getElementById('log-content');
        content.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + content.innerHTML;
    }

    async function updateAll() {
        addLog("連線至數據中繼站...");
        try {
            const response = await fetch(PROXY_URL);
            const data = await response.json();
            
            // 7769 解析
            const twKey = Object.keys(data).find(k => k.includes("7769"));
            if (twKey) {
                const tw = data[twKey].chart.result[0].meta;
                const price = tw.regularMarketPrice;
                const diff = price - tw.previousClose;
                const perc = (diff / tw.previousClose) * 100;
                document.getElementById('p-7769').innerText = price.toFixed(2);
                document.getElementById('p-7769').style.color = 'var(--red)';
                document.getElementById('diff-7769').innerText = `▲ ${diff.toFixed(2)} (${perc.toFixed(2)}%)`;
                document.getElementById('diff-7769').style.color = 'var(--red)';
                document.getElementById('card-7769').className = 'card up';
                addLog("✅ 鴻勁數據同步成功");
            }

            // VIX 解析
            const vixKey = Object.keys(data).find(k => k.toUpperCase().includes("VIX"));
            if (vixKey) {
                const vixVal = data[vixKey].chart.result[0].meta.regularMarketPrice;
                document.getElementById('p-vix').innerText = vixVal.toFixed(2);
                addLog("✅ VIX 數據同步成功");
            }

            // 重新整理 iframe 確保數據最新
            document.getElementById('cnn-frame').src = document.getElementById('cnn-frame').src;
            addLog("🔄 M平方圖表已重載");

        } catch (e) {
            addLog("❌ 錯誤: " + e.message);
        }
    }

    updateAll();
</script>
</body>
</html>
