<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7769 投資戰情室 v1.6.1</title>
    <style>
        :root { --red: #ff5252; --green: #2ecc71; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .dashboard { width: 100%; max-width: 400px; display: grid; gap: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); border-left: 6px solid #444; position: relative; transition: 0.3s; }
        .card.up { border-left-color: var(--red); }
        .card.down { border-left-color: var(--green); }
        .label { font-size: 13px; color: #aaa; font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .main-val { font-size: 2.8rem; font-weight: 800; margin: 5px 0; letter-spacing: -1px; }
        .sub-val { font-size: 1.1rem; font-weight: 600; }
        .cnn-card { background: linear-gradient(145deg, #2c2c2c, #000); cursor: pointer; border-left: 6px solid #f1c40f; text-align: center; }
        .btn-refresh { background: #3367d6; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; font-size: 16px; }
        #log-window { width: 100%; max-width: 380px; margin-top: 20px; background: #000; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 11px; color: #555; height: 120px; overflow-y: auto; }
        .copy-tag { font-size: 10px; color: #444; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="card-7769" class="card">
        <div class="label"><span>鴻勁 (7769.TW)</span></div>
        <div id="p-7769" class="main-val">--.--</div>
        <div id="diff-7769" class="sub-val">--.-- (--%)</div>
    </div>

    <div id="card-vix" class="card">
        <div class="label"><span>美股恐慌指數 (VIX)</span></div>
        <div id="p-vix" class="main-val" style="color: #f1c40f;">--.--</div>
        <div id="status-vix" class="sub-val" style="color: #888;">等待數據...</div>
    </div>

    <div class="card cnn-card" onclick="window.open('https://edition.cnn.com/markets/fear-and-greed')">
        <div class="label" style="justify-content: center;">CNN Fear & Greed Index</div>
        <div style="font-size: 1.1rem; margin: 10px 0; color: #f1c40f;">查看全球情緒指針 ↗</div>
    </div>

    <button class="btn-refresh" onclick="updateAll()">更新全球市場數據</button>
</div>

<div id="log-window">
    <span class="copy-tag" onclick="copyLog()">[複製 LOG]</span>
    <div id="log-content">系統初始化...</div>
</div>

<script>
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbx5h5oQLvricMy5t5UGvJRyoO8Wklk_BJdyEiT7FroNlukw0mgH8PuN7rPMQvIv8uJO9Q/exec';

    function addLog(msg) {
        const content = document.getElementById('log-content');
        content.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + content.innerHTML;
    }

    async function updateAll() {
        addLog("正在連線中繼站...");
        try {
            const response = await fetch(PROXY_URL);
            const data = await response.json();
            addLog("數據已回傳，開始解析...");

            // --- 處理 7769 ---
            try {
                if (data["7769.TW"] && data["7769.TW"].chart && data["7769.TW"].chart.result) {
                    const tw = data["7769.TW"].chart.result[0].meta;
                    const price = tw.regularMarketPrice;
                    const prevClose = tw.previousClose;
                    const diff = price - prevClose;
                    const percent = (diff / prevClose) * 100;
                    
                    document.getElementById('p-7769').innerText = price.toFixed(2);
                    document.getElementById('diff-7769').innerText = `${diff >= 0 ? '▲' : '▼'} ${Math.abs(diff).toFixed(2)} (${percent.toFixed(2)}%)`;
                    
                    const card7769 = document.getElementById('card-7769');
                    const color = diff >= 0 ? 'var(--red)' : 'var(--green)';
                    card7769.className = diff >= 0 ? 'card up' : 'card down';
                    document.getElementById('p-7769').style.color = color;
                    document.getElementById('diff-7769').style.color = color;
                    addLog("✅ 鴻勁數據更新成功");
                } else {
                    addLog("⚠️ 鴻勁數據格式異常");
                }
            } catch(e) { addLog("❌ 解析 7769 失敗"); }

            // --- 處理 VIX ---
            try {
                // 修正 VIX 的 Key 讀取方式，應對可能的符號問題
                const vixObj = data["^VIX"] || data["VIX"]; 
                if (vixObj && vixObj.chart && vixObj.chart.result) {
                    const vixData = vixObj.chart.result[0].meta;
                    const vixPrice = vixData.regularMarketPrice;
                    document.getElementById('p-vix').innerText = vixPrice.toFixed(2);
                    document.getElementById('status-vix').innerText = vixPrice > 25 ? "🔥 市場恐慌" : "市場平穩";
                    addLog("✅ VIX 數據更新成功");
                } else {
                    addLog("⚠️ VIX 數據目前無法取得");
                    document.getElementById('p-vix').innerText = "N/A";
                }
            } catch(e) { addLog("❌ 解析 VIX 失敗"); }

        } catch (err) {
            addLog(`❌ 伺服器連線失敗: ${err.message}`);
        }
    }

    function copyLog() {
        navigator.clipboard.writeText(document.getElementById('log-content').innerText);
        alert("Log 已複製");
    }

    updateAll();
</script>
</body>
</html>
