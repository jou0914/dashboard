<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7769 鴻勁 股價監測</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h1 { color: #333; margin-bottom: 0.5rem; }
        .symbol { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .price { font-size: 3rem; font-weight: bold; color: #e74c3c; margin: 10px 0; }
        .info { display: flex; justify-content: space-between; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .update-btn { margin-top: 20px; padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .update-btn:hover { background: #2980b9; }
        #loading { font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>

<div class="card">
    <h1>鴻勁</h1>
    <div class="symbol">7769.TPE (Alpha Vantage 資料來源)</div>
    <div id="price" class="price">--.--</div>
    <div id="loading">準備就緒</div>
    
    <div class="info">
        <div><span>開盤:</span> <strong id="open">--</strong></div>
        <div><span>最高:</span> <strong id="high">--</strong></div>
    </div>
    
    <button class="update-btn" onclick="fetchStockData()">更新行情</button>
</div>

<script>
    // 請在此處填入您的 API 金鑰
    const API_KEY = '12F9YHGH3T1063OB';
    const SYMBOL = '7769.TPE';

    async function fetchStockData() {
        const loadingText = document.getElementById('loading');
        loadingText.innerText = '讀取中...';
        
        try {
            const response = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${SYMBOL}&apikey=${API_KEY}`);
            const data = await response.json();
            
            const quote = data["Global Quote"];
            
            if (quote && quote["05. price"]) {
                document.getElementById('price').innerText = parseFloat(quote["05. price"]).toFixed(2);
                document.getElementById('open').innerText = parseFloat(quote["02. open"]).toFixed(2);
                document.getElementById('high').innerText = parseFloat(quote["03. high"]).toFixed(2);
                loadingText.innerText = `最後更新: ${quote["07. latest trading day"]}`;
            } else {
                loadingText.innerText = '找不到資料或 API 次數達上限';
            }
        } catch (error) {
            console.error('Error:', error);
            loadingText.innerText = '連線錯誤';
        }
    }

    // 初始載入
    fetchStockData();
</script>

</body>
</html>
