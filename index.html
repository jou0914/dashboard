<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易儀表板 v3</title>

<style>
body { background:#000; color:#fff; font-family:-apple-system; }
.container { max-width:520px; margin:auto; padding:20px; }

.card {
  background:#111;
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
  border:1px solid #222;
}

.big { font-size:2rem; font-weight:bold; }

.up { color:#00e676; }
.down { color:#ff5252; }

.sentiment {
  font-size:1.5rem;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

  <div class="card">
    <div>市場情緒</div>
    <div id="sent" class="sentiment">--</div>
  </div>

  <div class="card">
    <div>VIX</div>
    <div id="vix" class="big">--</div>
  </div>

  <div class="card">
    <div>USD/TWD</div>
    <div id="twd" class="big">--</div>
  </div>

  <div class="card">
    <div>融資變化</div>
    <div id="m"></div>
  </div>

  <div class="card">
    <div>融券變化</div>
    <div id="s"></div>
  </div>

  <!-- Debug -->
  <div class="card">
    <div>LOG</div>
    <div id="log"></div>
  </div>

</div>

<script>
const API = "https://dashboard.jou0914.workers.dev";

function log(t){document.getElementById("log").innerHTML = t+"<br>"+document.getElementById("log").innerHTML;}

async function run(){
  const t0 = performance.now();

  try{
    const r = await fetch(API + "/market");
    const d = await r.json();

    document.getElementById("vix").textContent = d.vix?.toFixed(2);
    document.getElementById("twd").textContent = d.twd?.toFixed(2);
    document.getElementById("m").textContent = d.marginChange;
    document.getElementById("s").textContent = d.shortChange;

    const el = document.getElementById("sent");
    el.textContent = d.sentiment;

    if(d.sentiment==="偏多") el.className="sentiment up";
    if(d.sentiment==="偏空") el.className="sentiment down";

    log("OK "+Math.round(performance.now()-t0)+"ms");

  }catch(e){
    log("ERR");
  }
}

run();
setInterval(run,20000);
</script>

</body>
</html>
