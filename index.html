<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7769 戰情室 v5.4</title>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --bg: #121212; --card: #1c1c1e; --text: #e0e0e0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .dashboard { width: 100%; max-width: 380px; display: grid; gap: 12px; }
        .card { background: var(--card); padding: 18px; border-radius: 16px; border-left: 5px solid #444; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .card.up { border-left-color: var(--red); }
        .card.down { border-left-color: var(--green); }
        .label { font-size: 12px; color: #888; font-weight: 600; margin-bottom: 4px; }
        .main-val { font-size: 2.6rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .sub-val { font-size: 1rem; font-weight: 600; }
        
        .gauge-container { position: relative; width: 240px; height: 130px; margin: 10px auto 0; }
        #cnnGauge { width: 240px; height: 130px; }
        #fngValue { font-size: 2.5rem; font-weight: bold; position: absolute; bottom: 5px; width: 100%; text-align: center; }
        
        .btn-cnn { background: #cc0000; color: white; text-decoration: none; display: block; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; text-align: center; margin-top: 10px; }
        .btn-refresh { background: #3367d6; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; font-size: 16px; cursor: pointer; }
        
        .log-container { width: 100%; max-width: 380px; margin-top: 15px; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        .log-header { background: #222; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
        .btn-copy { background: #555; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        #log-window { background: #000; padding: 12px; font-family: monospace; font-size: 10px; color: #00ff00; height: 120px; overflow-y: auto; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="card-7769" class="card">
        <div class="label">鴻勁 (7769.TW)</div>
        <div id="p-7769" class="main-val">--</div>
        <div id="diff-7769" class="sub-val">--</div>
    </div>

    <div id="card-vix" class="card">
        <div class="label">美股恐慌指數 (VIX)</div>
        <div id="p-vix" class="main-val" style="color:#f1c40f;">--</div>
        <div class="sub-val" id="vix-status" style="color:#888;">數據同步中...</div>
    </div>

    <div class="card" style="border-left-color: #f1c40f;">
        <div class="label">Crypto Fear & Greed Index</div>
        <div class="gauge-container">
            <canvas id="cnnGauge"></canvas>
            <div id="fngValue">--</div>
        </div>
        <div id="fngStatus" style="text-align:center; color:#f1c40f; font-weight:bold; margin-top:5px;">偵測中...</div>
        <a href="https://www.cnn.com/markets/fear-and-greed" target="_blank" class="btn-cnn">打開 CNN 恐慌指數官網</a>
    </div>

    <button class="btn-refresh" onclick="updateAll()">FORCE REFRESH</button>
</div>

<div class="log-container">
    <div class="log-header">
        <span>DEBUG CONSOLE</span>
        <button class="btn-copy" onclick="copyLog()">COPY LOG</button>
    </div>
    <div id="log-window">Initializing...</div>
</div>

<script>
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyNlJGWxjsAK-uX34PxvTT3nFaezansCwcL9a7dvGS9ccOsFW8IviPc59WlVKshS9DzQg/exec';

    function addLog(msg) {
        const win = document.getElementById('log-window');
        win.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}\n` + win.innerHTML;
    }

    function copyLog() {
        const text = document.getElementById('log-window').innerText;
        navigator.clipboard.writeText(text).then(() => alert('Log 已複製到剪貼簿'));
    }

    function drawGauge(value) {
        const canvas = document.getElementById('cnnGauge');
        const ctx = canvas.getContext('2d');
        canvas.width = 480; canvas.height = 260; ctx.scale(2, 2);
        ctx.clearRect(0, 0, 240, 130);
        ctx.beginPath();
        ctx.arc(120, 120, 100, Math.PI, 0); ctx.lineWidth = 18; ctx.strokeStyle = '#2a2a2e'; ctx.stroke();
        if (value !== null) {
            const grad = ctx.createLinearGradient(20, 0, 220, 0);
            grad.addColorStop(0, '#ff4d4d'); grad.addColorStop(0.5, '#f1c40f'); grad.addColorStop(1, '#2ecc71');
            ctx.beginPath(); 
            const endAngle = Math.PI + (Math.PI * (value / 100));
            ctx.arc(120, 120, 100, Math.PI, endAngle); ctx.strokeStyle = grad; ctx.stroke();
        }
    }

    async function updateAll() {
        addLog('Connecting to GAS...');
        try {
            const res = await fetch(PROXY_URL);
            const data = await res.json();

            // 1. 7769
            if (data.stock_7769?.chart?.result) {
                const m = data.stock_7769.chart.result[0].meta;
                const price = m.regularMarketPrice;
                const diff = price - m.previousClose;
                const perc = (diff / m.previousClose) * 100;
                document.getElementById('p-7769').innerText = price.toLocaleString();
                document.getElementById('diff-7769').innerText = `${diff >= 0 ? '▲' : '▼'} ${Math.abs(diff).toFixed(1)} (${perc.toFixed(2)}%)`;
                const color = diff >= 0 ? 'var(--red)' : 'var(--green)';
                document.getElementById('p-7769').style.color = color;
                document.getElementById('diff-7769').style.color = color;
                document.getElementById('card-7769').className = `card ${diff >= 0 ? 'up' : 'down'}`;
                addLog('✅ 7769 Updated');
            }

            // 2. VIX
            if (data.vix_index?.chart?.result) {
                const v = data.vix_index.chart.result[0].meta.regularMarketPrice;
                document.getElementById('p-vix').innerText = v.toFixed(2);
                document.getElementById('vix-status').innerText = "數據已更新";
                addLog('✅ VIX Updated');
            }

            // 3. Crypto F&G
            if (data.crypto_fng?.data) {
                const val = parseInt(data.crypto_fng.data[0].value);
                const rating = data.crypto_fng.data[0].value_classification;
                document.getElementById('fngValue').innerText = val;
                document.getElementById('fngStatus').innerText = rating.toUpperCase();
                drawGauge(val);
                addLog('✅ Crypto F&G: ' + val);
            }

        } catch (e) {
            addLog('❌ Error: ' + e.message);
        }
    }

    drawGauge(null);
    updateAll();
</script>

</body>
</html>
