<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>核心市場監控</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px; width: 100%; max-width: 900px; }
    .card { background: #161616; border: 1px solid #262626; border-radius: 12px; padding: 20px; text-align: center; }
    .label { font-size: 0.8rem; color: #888; margin-bottom: 5px; }
    .price { font-size: 2.5rem; font-weight: bold; }
    .us { color: #f0c040; } .tw { color: #40a0f0; } .stock { color: #48bb78; }
    .iframe-container { width: 100%; max-width: 900px; height: 400px; margin: 20px 0; border: 1px solid #262626; border-radius: 12px; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
    canvas { width: 100%; max-width: 900px; background: #161616; border-radius: 12px; padding: 10px; border: 1px solid #262626; }
  </style>
</head>
<body>

  <div class="grid">
    <div class="card">
      <div class="label">CBOE VIX (美股)</div>
      <div id="p-us" class="price us">--</div>
    </div>
    <div class="card">
      <div class="label">VIXTWN (台股)</div>
      <div id="p-tw" class="price tw">--</div>
    </div>
    <div class="card">
      <div class="label">鴻勁 (7769)</div>
      <div id="p-7769" class="price stock">--</div>
    </div>
  </div>

  <div class="iframe-container">
    <iframe src="https://www.wantgoo.com/index/vixtwn/chart"></iframe>
  </div>

  <canvas id="vixChart"></canvas>

<script>
  const WORKER = "https://dashboard.jou0914.workers.dev";
  const ctx = document.getElementById("vixChart").getContext("2d");
  const chart = new Chart(ctx, {
    type: "line",
    data: { labels: [], datasets: [{ label: "VIX", data: [], borderColor: "#f0c040", fill: false, tension: 0.3 }] },
    options: { plugins: { legend: { display: false } } }
  });

  async function refresh() {
    // 美股
    fetch(`${WORKER}/vix`).then(r => r.json()).then(d => {
      document.getElementById("p-us").textContent = d.price.toFixed(2);
      chart.data.labels = d.history.map(h => h.date);
      chart.data.datasets[0].data = d.history.map(h => h.price);
      chart.update();
    });

    // 台股
    fetch(`${WORKER}/vixtw`).then(r => r.json()).then(d => {
      if(d.price) document.getElementById("p-tw").textContent = d.price.toFixed(2);
    });

    // 鴻勁
    fetch(`${WORKER}/7769`).then(r => r.json()).then(d => {
      if(d.price) document.getElementById("p-7769").textContent = d.price.toLocaleString();
    });
  }

  refresh();
  setInterval(refresh, 60000);
</script>
</body>
</html>
