<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY DAILY BRIEF | 核心資產監控 v6.1</title>
    <style>
        :root {
            --bg: #0a0a0a; --card-bg: #161616; --border: #262626;
            --text-main: #ffffff; --text-muted: #888888;
            --red: #f56565; --green: #48bb78; --yellow: #f6ad55;
        }
        body { background: var(--bg); color: var(--text-main); font-family: sans-serif; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 24px; }
        .logo span { color: var(--yellow); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .price-large { font-size: 2rem; font-weight: bold; margin: 8px 0; }
        .change-tag { font-size: 0.9rem; }
        .gauge-container { height: 4px; border-radius: 2px; margin: 12px 0; position: relative; background: linear-gradient(to right, var(--green) 0%, var(--yellow) 50%, var(--red) 100%); }
        .needle { width: 4px; height: 12px; background: white; position: absolute; top: -4px; border-radius: 2px; transition: left 0.5s ease; }
    </style>
</head>
<body>
    <header>
        <div class="logo">MY DAILY BRIEF / <span>核心資產監控系統 v6.1</span></div>
        <div id="clock" style="color: var(--text-muted); font-family: monospace;">--:--:--</div>
    </header>

    <div class="grid">
        <div class="card">
            <div style="color: var(--text-muted); font-size: 0.8rem;">鴻勁 7769:TPE</div>
            <div class="price-large" style="color: var(--red);">3,710.00</div>
            <div class="change-tag" style="color: var(--red);">-80.00 (-2.11%)</div>
        </div>
        <div class="card">
            <div style="color: var(--text-muted); font-size: 0.8rem;">台股波動率 VIXTW</div>
            <div id="vixtw-num" class="price-large">--</div>
            <div id="vixtw-status" class="change-tag">載入中...</div>
            <div class="gauge-container"><div id="vixtw-needle" class="needle" style="left: 50%;"></div></div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString() + " " + (now.getMonth()+1) + "/" + now.getDate();
        }
        setInterval(updateClock, 1000);

            [span_2](start_span)if (val < 15) return { lbl: "極度平靜", col: "#48bb78" };[span_2](end_span)
            [span_3](start_span)if (val < 20) return { lbl: "常態波動", col: "#a0aec0" };[span_3](end_span)
            [span_4](start_span)if (val < 30) return { lbl: "警戒區間", col: "#f6ad55" };[span_4](end_span)
            [span_5](start_span)return { lbl: "高度恐慌", col: "#f56565" };[span_5](end_span)

                [span_6](start_span)const response = await fetch('https://dashboard.jou0914.workers.dev');[span_6](end_span)

                    [span_8](start_span)document.getElementById('vixtw-num').textContent = data.price.toFixed(2);[span_8](end_span)

                    document.getElementById('vixtw-status').style.color = status.col;
                    
                    [span_10](start_span)const pos = Math.min(Math.max((data.price - 10) / 30 * 100, 0), 100);[span_10](end_span)
                    document.getElementById('vixtw-needle').style.left = pos + '%';
                }
            } catch (e) {
                [span_11](start_span)document.getElementById('vixtw-status').textContent = "API 載入失敗";[span_11](end_span)
            }
        }
        fetchVIXTW();
        setInterval(fetchVIXTW, 300000); [span_12](start_span)// 5分鐘更新[span_12](end_span)
    </script>
</body>
</html>
