<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>交易儀表板 v3</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --border: #2c2c2e; --text: #fff; --green: #30d158; --red: #ff453a; --gray: #8e8e93; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        .container { max-width: 480px; margin: auto; padding: 20px; padding-bottom: 120px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .sentiment-tag { font-size: 16px; font-weight: 600; padding: 6px 14px; border-radius: 20px; background: #2c2c2e; }
        .up { color: var(--green); background: rgba(48, 209, 88, 0.15); }
        .down { color: var(--red); background: rgba(255, 69, 58, 0.15); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .label { color: var(--gray); font-size: 13px; margin-bottom: 8px; display: block; }
        .value { font-size: 22px; font-weight: 700; }
        #log { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.9); color: #0f0; font-size: 10px; padding: 10px; max-height: 80px; overflow-y: auto; border-top: 1px solid #333; z-index: 1000; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="font-size:24px;margin:0">交易儀表板</h1>
            <div id="sent" class="sentiment-tag">--</div>
        </div>

        <div class="grid">
            <div class="card"><span class="label">CNN 恐慌指數</span><div id="cnn" class="value">--</div></div>
            <div class="card"><span class="label">美股 VIX</span><div id="vix" class="value">--</div></div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between;">
                <div><span class="label">USD / TWD</span><div id="twd" class="value">--</div></div>
                <div style="text-align:right;"><span class="label">台指 VIX</span><div id="vixtw" class="value">--</div></div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <span class="label">融資變化 (億)</span>
                <div id="m" class="value">--</div>
            </div>
            <div class="card">
                <span class="label">融券變化 (張)</span>
                <div id="s" class="value">--</div>
            </div>
        </div>
    </div>
    <div id="log">系統啟動中...</div>

    <script>
        const API = "https://dashboard.jou0914.workers.dev/market"; [span_2](start_span)//[span_2](end_span)

        function log(msg) {
            const l = document.getElementById("log");
            l.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + l.innerHTML;
        }

        async function update() {
            log("正在同步數據...");
            try {
                const r = await fetch(API, { cache: 'no-store' });
                const d = await r.json();
                
                document.getElementById("cnn").textContent = d.cnn ?? "--";
                document.getElementById("vix").textContent = d.vix ? d.vix.toFixed(2) : "--";
                document.getElementById("vixtw").textContent = d.vixtw ? d.vixtw.toFixed(2) : "--";
                document.getElementById("twd").textContent = d.twd ? d.twd.toFixed(2) : "--";

                if (d.marginChange !== undefined) {
                    const val = d.marginChange / 100000000;
                    document.getElementById("m").textContent = (val > 0 ? "+" : "") + val.toFixed(2);
                    document.getElementById("m").style.color = val > 0 ? "var(--green)" : "var(--red)";
                }
                if (d.shortChange !== undefined) {
                    document.getElementById("s").textContent = (d.shortChange > 0 ? "+" : "") + d.shortChange.toLocaleString();
                }

                const s = document.getElementById("sent");
                s.textContent = d.sentiment || "中性";
                s.className = "sentiment-tag " + (d.sentiment === "偏多" ? "up" : (d.sentiment === "偏空" ? "down" : ""));
                
                log("更新成功");
            } catch (e) {
                log("ERR: " + e.message);
            }
        }

        update();
        setInterval(update, 60000); // 建議維持 1 分鐘，避免觸發 Yahoo/Alpha 的頻率限制
    </script>
</body>
</html>
