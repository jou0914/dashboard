<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全球投資戰情室 v9.6</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --bg: #000; --card: #1c1c1e; --text: #e0e0e0; --gold: #f1c40f; --alert: #ffcc00; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .dashboard { width: 100%; max-width: 380px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card { background: var(--card); padding: 12px; border-radius: 18px; border-left: 4px solid #444; height: 145px; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; position: relative; }
        .full-width { grid-column: span 2; height: 175px; }
        .card.up { border-left-color: var(--red); }
        .card.down { border-left-color: var(--green); }
        .card.alert-active { border-left-color: var(--alert); box-shadow: inset 0 0 15px rgba(255, 204, 0, 0.2); }
        .label { font-size: 11px; color: #999; font-weight: 600; margin-bottom: 2px; }
        .main-val { font-size: 1.3rem; font-weight: 800; line-height: 1.1; letter-spacing: -0.5px; }
        .sub-val { font-size: 0.75rem; font-weight: 600; margin-top: 2px; }
        .chart-container { width: 100%; height: 50px; margin-top: auto; }
        .alert-hint { font-size: 9px; color: var(--alert); font-weight: bold; margin-top: 4px; display: block; }
        .gold-calc-row { font-size: 0.85rem; color: var(--gold); font-weight: 900; border-top: 1px solid #444; margin-top: 8px; padding-top: 6px; line-height: 1.5; }
        .fng-area { grid-column: span 2; display: flex; flex-direction: column; align-items: center; background: var(--card); border-radius: 20px; padding: 15px; border-left: 4px solid var(--gold); min-height: 200px; }
        #fngValue { font-size: 3.5rem; font-weight: bold; margin: 10px 0; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 15px; }
        .btn-link { color: white; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50px; border-radius: 12px; font-size: 11px; font-weight: bold; background: #2c2c2e; border: 1px solid #3a3a3c; }
        .btn-refresh { background: #007aff; color: white; border: none; padding: 18px; border-radius: 16px; font-weight: bold; width: 100%; margin-top: 15px; font-size: 17px; cursor: pointer; grid-column: span 2; }
        #log-window { background: #111; padding: 10px; font-family: monospace; font-size: 10px; color: #00ff00; height: 70px; overflow-y: auto; width: 100%; max-width: 360px; border-radius: 12px; border: 1px solid #333; margin-top: 15px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="card-twii" class="card"><div class="label">台股大盤 (^TWII)</div><div id="p-twii" class="main-val">--</div><div id="diff-twii" class="sub-val">--</div><div class="chart-container"><canvas id="chart-twii"></canvas></div></div>
    <div id="card-ym" class="card"><div class="label">道瓊期貨 (YM=F)</div><div id="p-ym" class="main-val">--</div><div id="diff-ym" class="sub-val">--</div><div class="chart-container"><canvas id="chart-ym"></canvas></div></div>
    <div id="card-7769" class="card"><div class="label">鴻勁 (7769.TW)</div><div id="p-7769" class="main-val">--</div><div id="diff-7769" class="sub-val">--</div><div class="chart-container"><canvas id="chart-7769"></canvas></div></div>
    <div id="card-oil" class="card"><div class="label">布蘭特原油 (Brent)</div><div id="p-oil" class="main-val">--</div><div id="diff-oil" class="sub-val">--</div><div class="chart-container"><canvas id="chart-oil"></canvas></div></div>
    
    <div id="card-vix" class="card full-width">
        <div class="label">美股 VIX 指數</div><div id="p-vix" class="main-val">--</div><div id="diff-vix" class="sub-val">--</div>
        <div class="alert-hint">⚠️ 極度恐慌參考指標：> 30</div>
        <div class="chart-container"><canvas id="chart-vix"></canvas></div>
    </div>

    <div id="card-twd" class="card"><div class="label">USD / TWD</div><div id="p-twd" class="main-val">--</div><div id="diff-twd" class="sub-val">--</div><div class="chart-container"><canvas id="chart-twd"></canvas></div></div>
    <div id="card-jpy" class="card">
        <div class="label">USD / JPY</div><div id="p-jpy" class="main-val">--</div><div id="diff-jpy" class="sub-val">--</div>
        <div class="alert-hint">⚠️ 指標：> 159.5</div>
        <div class="chart-container"><canvas id="chart-jpy"></canvas></div>
    </div>

    <div id="card-gold" class="card full-width">
        <div class="label">國際現貨黃金 (oz)</div><div id="p-gold" class="main-val">--</div><div id="diff-gold" class="sub-val">--</div>
        <div id="gold-calc" class="gold-calc-row">等待同步匯率換算...</div>
        <div class="chart-container" style="height: 35px;"><canvas id="chart-gold"></canvas></div>
    </div>

    <div id="fng-container" class="fng-area">
        <div class="label">CRYPTO FEAR & GREED</div>
        <div id="fngValue">--</div>
        <div class="alert-hint">⚠️ 極度恐慌參考：< 10</div>
        <div class="btn-row">
            <a href="https://www.cnn.com/markets/fear-and-greed" target="_blank" class="btn-link" style="background:#cc0000;border:none;">CNN 恐慌按鈕<br>指標：< 10</a>
            <a href="https://www.wantgoo.com/index/vixtwn" target="_blank" class="btn-link">台股 VIX 網頁<br>指標：> 40</a>
        </div>
    </div>
    <button class="btn-refresh" onclick="updateAll()">FORCE REFRESH</button>
</div>

<div id="log-window">System Initializing... v9.6</div>
<button onclick="copyLog()" style="width:100%; max-width:380px; margin-top:5px; background:#333; color:#ccc; border:none; padding:8px; border-radius:8px; cursor:pointer;">一鍵複製 LOG</button>

<script>
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyNlJGWxjsAK-uX34PxvTT3nFaezansCwcL9a7dvGS9ccOsFW8IviPc59WlVKshS9DzQg/exec';
    let charts = {};

    function addLog(msg) {
        const win = document.getElementById('log-window');
        win.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}\n` + win.innerHTML;
    }

    function copyLog() { navigator.clipboard.writeText(document.getElementById('log-window').innerText).then(() => alert('Log 已複製')); }

    function renderSparkline(id, historyData, color) {
        const canvas = document.getElementById(`chart-${id}`);
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        if (charts[id]) charts[id].destroy();
        charts[id] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: historyData.map((_, i) => i),
                datasets: [{
                    data: historyData, borderColor: color, borderWidth: 2, pointRadius: 0, fill: true,
                    backgroundColor: (c) => {
                        const g = c.chart.ctx.createLinearGradient(0, 0, 0, 50);
                        g.addColorStop(0, color + '33'); g.addColorStop(1, color + '00'); return g;
                    },
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }

    function updateCard(id, data) {
        if (!data || data.error || !data.chart?.result) { addLog(`⚠️ ${id} 無法讀取曲線`); return null; }
        const res = data.chart.result[0];
        const m = res.meta;
        const price = m.regularMarketPrice;
        const prev = m.previousClose;
        const diff = price - prev;
        const perc = (diff / prev) * 100;
        let color = diff >= 0 ? '#ff4d4d' : '#2ecc71';
        
        document.getElementById(`p-${id}`).innerText = price.toLocaleString(undefined, {minimumFractionDigits: (id.includes('twd')||id.includes('jpy')?3:2)});
        document.getElementById(`p-${id}`).style.color = color;
        document.getElementById(`diff-${id}`).innerText = `${diff >= 0 ? '▲' : '▼'} ${Math.abs(diff).toFixed(2)} (${perc.toFixed(2)}%)`;
        document.getElementById(`diff-${id}`).style.color = color;

        const isAlert = (id === 'jpy' && price > 159.5) || (id === 'vix' && price > 30);
        document.getElementById(`card-${id}`).className = `card ${(id === 'gold' || id === 'vix' ? 'full-width' : '')} ${diff >= 0 ? 'up' : 'down'} ${isAlert ? 'alert-active' : ''}`;

        try {
            const h = res.indicators.quote[0].close.filter(v => v !== null);
            if (h.length > 0) renderSparkline(id, h, color);
        } catch(e) {}
        return price;
    }

    async function updateAll() {
        addLog('正在同步全球市場數據...');
        try {
            const res = await fetch(PROXY_URL);
            const data = await res.json();

            updateCard('twii', data.stock_twii);
            updateCard('ym', data.stock_ym);
            updateCard('7769', data.stock_7769);
            updateCard('oil', data.oil_brent);
            updateCard('vix', data.vix_index);
            const liveTwd = updateCard('twd', data.usd_twd);
            updateCard('jpy', data.usd_jpy);

            // 黃金價格精準換算
            const goldRes = data.gold_price?.chart?.result[0];
            if (goldRes) {
                const goldPrice = goldRes.meta.regularMarketPrice;
                updateCard('gold', data.gold_price);
                if (liveTwd) {
                    const perG = (goldPrice / 31.1035) * liveTwd;
                    const perQ = perG * 3.75;
                    document.getElementById('gold-calc').innerHTML = `即時換算：${Math.round(perG).toLocaleString()} NT$ / 克<br>即時換算：${Math.round(perQ).toLocaleString()} NT$ / 錢`;
                }
            }

            if (data.crypto_fng?.data) {
                const val = data.crypto_fng.data[0].value;
                document.getElementById('fngValue').innerText = val;
                document.getElementById('fngValue').style.color = val < 20 ? 'var(--red)' : 'var(--green)';
                addLog('✅ 數據全部載入完成');
            }
        } catch (e) { addLog('❌ 同步失敗: ' + e.message); }
    }

    updateAll();
    setInterval(updateAll, 300000);
</script>
</body>
</html>
