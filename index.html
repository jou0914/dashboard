<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投資戰情室 v8.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --bg: #000; --card: #1c1c1e; --text: #e0e0e0; --gold: #f1c40f; --alert: #ffcc00; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .dashboard { width: 100%; max-width: 380px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .card { background: var(--card); padding: 12px; border-radius: 18px; border-left: 4px solid #444; height: 130px; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; position: relative; }
        .full-width { grid-column: span 2; height: 145px; }
        .card.up { border-left-color: var(--red); }
        .card.down { border-left-color: var(--green); }
        .card.alert-bg { border-left-color: var(--alert); box-shadow: inset 0 0 15px rgba(255, 204, 0, 0.15); }
        
        .label { font-size: 11px; color: #999; font-weight: 600; margin-bottom: 3px; }
        .main-val { font-size: 1.4rem; font-weight: 800; line-height: 1.1; letter-spacing: -0.5px; }
        .sub-val { font-size: 0.8rem; font-weight: 600; margin-top: 2px; }
        .chart-container { width: 100%; height: 38px; margin-top: auto; }
        
        .alert-hint { font-size: 9px; color: var(--alert); font-weight: bold; margin-top: 4px; opacity: 0.9; }
        .gold-calc { font-size: 0.9rem; color: var(--gold); margin-top: 8px; font-weight: bold; border-top: 1px solid #333; padding-top: 8px; }
        
        .flex-row { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .fng-area { grid-column: span 2; display: flex; flex-direction: column; align-items: center; background: var(--card); border-radius: 20px; padding: 15px; border-left: 4px solid var(--gold); min-height: 185px; margin-top: 5px; }
        .fng-gauge-wrapper { position: relative; width: 220px; height: 110px; margin: 10px 0; }
        #cnnGauge { width: 220px !important; height: 110px !important; }
        #fngValue { font-size: 2.4rem; font-weight: bold; position: absolute; bottom: -5px; width: 100%; text-align: center; left: 0; }
        #fngStatus { font-size: 11px; color: var(--gold); font-weight: bold; text-transform: uppercase; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 15px; }
        .btn-link { color: white; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 55px; border-radius: 14px; font-size: 11px; font-weight: bold; text-align: center; background: #2c2c2e; border: 1px solid #3a3a3c; }
        .btn-cnn { background: #cc0000; border: none; }
        .btn-sub { font-size: 9px; color: var(--alert); font-weight: normal; margin-top: 3px; }

        .btn-refresh { background: #007aff; color: white; border: none; padding: 18px; border-radius: 16px; font-weight: bold; width: 100%; margin-top: 15px; font-size: 17px; cursor: pointer; grid-column: span 2; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3); }
        #log-window { background: #111; padding: 12px; font-family: 'SF Mono', monospace; font-size: 10px; color: #00ff00; height: 90px; overflow-y: auto; width: 100%; max-width: 360px; border-radius: 14px; border: 1px solid #333; margin-top: 15px; white-space: pre-wrap; line-height: 1.4; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="card-twii" class="card">
        <div class="label">台股大盤 (^TWII)</div>
        <div id="p-twii" class="main-val">--</div>
        <div id="diff-twii" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-twii"></canvas></div>
    </div>
    <div id="card-wtx" class="card">
        <div id="label-wtx" class="label">台指電子盤 (近全)</div>
        <div id="p-wtx" class="main-val">--</div>
        <div id="diff-wtx" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-wtx"></canvas></div>
    </div>

    <div id="card-7769" class="card">
        <div class="label">鴻勁 (7769.TW)</div>
        <div id="p-7769" class="main-val">--</div>
        <div id="diff-7769" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-7769"></canvas></div>
    </div>
    <div id="card-oil" class="card">
        <div class="label">布蘭特原油 (Brent)</div>
        <div id="p-oil" class="main-val">--</div>
        <div id="diff-oil" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-oil"></canvas></div>
    </div>

    <div id="card-vix" class="card full-width">
        <div class="label">美股 VIX 指數</div>
        <div id="p-vix" class="main-val">--</div>
        <div id="diff-vix" class="sub-val">--</div>
        <div class="alert-hint">指標：> 30 極度恐慌</div>
        <div class="chart-container"><canvas id="chart-vix"></canvas></div>
    </div>

    <div class="flex-row">
        <div id="card-twd" class="card">
            <div class="label">USD / TWD</div>
            <div id="p-twd" class="main-val">--</div>
            <div id="diff-twd" class="sub-val">--</div>
        </div>
        <div id="card-jpy" class="card">
            <div class="label">USD / JPY</div>
            <div id="p-jpy" class="main-val">--</div>
            <div id="diff-jpy" class="sub-val">--</div>
            <div class="alert-hint">指標：> 159 警戒</div>
        </div>
    </div>

    <div id="card-gold" class="card full-width">
        <div class="label">國際黃金 (oz)</div>
        <div id="p-gold" class="main-val">--</div>
        <div id="diff-gold" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-gold"></canvas></div>
        <div id="calc-gold" class="gold-calc">正在計算即時台幣金價...</div>
    </div>

    <div class="fng-area">
        <div id="fngStatus" class="label">CRYPTO FEAR & GREED</div>
        <div class="fng-gauge-wrapper">
            <canvas id="cnnGauge"></canvas>
            <div id="fngValue">--</div>
        </div>
        <div class="alert-hint">指標：< 10 極度恐慌</div>
        
        <div class="btn-row">
            <a href="https://www.cnn.com/markets/fear-and-greed" target="_blank" class="btn-link btn-cnn">
                CNN 恐慌指數按鈕
                <span class="btn-sub">指標：< 10</span>
            </a>
            <a href="https://www.wantgoo.com/index/vixtwn" target="_blank" class="btn-link">
                台股 VIX 網頁
                <span class="btn-sub">指標：> 40</span>
            </a>
        </div>
    </div>

    <button class="btn-refresh" onclick="updateAll()">FORCE REFRESH</button>
</div>

<div style="width:100%; max-width:360px; display:flex; justify-content:space-between; margin-top:15px; padding: 0 5px;">
    <span style="font-size:11px; color:#666; font-weight: bold;">DEBUG CONSOLE</span>
    <button onclick="copyLog()" style="background:#333; color:#aaa; border:none; padding:4px 12px; border-radius:8px; font-size:10px; cursor:pointer;">COPY LOG</button>
</div>
<div id="log-window">Connecting to GAS v8.0...</div>

<script>
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyNlJGWxjsAK-uX34PxvTT3nFaezansCwcL9a7dvGS9ccOsFW8IviPc59WlVKshS9DzQg/exec';
    let charts = {};

    function addLog(msg) {
        const win = document.getElementById('log-window');
        win.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}\n` + win.innerHTML;
    }

    function copyLog() {
        navigator.clipboard.writeText(document.getElementById('log-window').innerText).then(() => alert('Log 已複製到剪貼簿'));
    }

    function renderSparkline(id, historyData, color) {
        const canvas = document.getElementById(`chart-${id}`);
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        if (charts[id]) charts[id].destroy();
        charts[id] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: historyData.map((_, i) => i),
                datasets: [{
                    data: historyData, borderColor: color, borderWidth: 2.5, pointRadius: 0, fill: true,
                    backgroundColor: (c) => {
                        const g = c.chart.ctx.createLinearGradient(0, 0, 0, 40);
                        g.addColorStop(0, color + '33'); g.addColorStop(1, color + '00'); return g;
                    },
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }

    function updateCard(id, data) {
        if (!data || data.error || !data.chart?.result) { addLog(`⚠️ ${id} 數據擷取失敗`); return null; }
        const res = data.chart.result[0];
        const m = res.meta;
        const price = m.regularMarketPrice;
        const prev = m.previousClose;
        const diff = price - prev;
        const perc = (diff / prev) * 100;
        let color = diff >= 0 ? '#ff4d4d' : '#2ecc71';
        
        // 特殊處理：台指電子盤標籤
        if (id === 'wtx' && data.isBackup) {
            document.getElementById('label-wtx').innerText = "台指期備援 (YM)";
            document.getElementById('label-wtx').style.color = "#f1c40f";
        }

        const pElem = document.getElementById(`p-${id}`);
        const dElem = document.getElementById(`diff-${id}`);
        
        pElem.innerText = price.toLocaleString(undefined, {minimumFractionDigits: (id.includes('twd')||id.includes('jpy')?3:2)});
        pElem.style.color = color;
        if(dElem) {
            dElem.innerText = `${diff >= 0 ? '▲' : '▼'} ${Math.abs(diff).toFixed(2)} (${perc.toFixed(2)}%)`;
            dElem.style.color = color;
        }

        const card = document.getElementById(`card-${id}`);
        if(card) {
            let isAlert = (id === 'jpy' && price > 159) || (id === 'vix' && price > 30);
            card.className = `${id==='gold'||id==='vix'?'card full-width':'card'} ${diff>=0?'up':'down'} ${isAlert?'alert-bg':''}`;
        }

        try {
            const h = res.indicators.quote[0].close.filter(v => v !== null);
            if (h.length > 0) renderSparkline(id, h, color);
        } catch(e) {}
        return price;
    }

    async function updateAll() {
        addLog('正在同步全球市場數據...');
        try {
            const res = await fetch(PROXY_URL);
            const data = await res.json();
            updateCard('twii', data.stock_twii);
            updateCard('7769', data.stock_7769);
            updateCard('wtx', data.stock_wtx);
            updateCard('vix', data.vix_index);
            updateCard('oil', data.oil_brent);
            updateCard('jpy', data.usd_jpy);
            const twd = updateCard('twd', data.usd_twd);
            const goldOz = updateCard('gold', data.gold_price);
            
            if (twd && goldOz) {
                const ntG = (goldOz * twd) / 31.1035;
                document.getElementById('calc-gold').innerText = `即時換算：${Math.round(ntG).toLocaleString()} NT$ / 克`;
            }
            if (data.crypto_fng?.data) {
                const val = parseInt(data.crypto_fng.data[0].value);
                document.getElementById('fngValue').innerText = val;
                drawGauge(val);
                addLog('✅ Dashboard Updated');
            }
        } catch (e) { addLog('❌ Sync Failed: ' + e.message); }
    }

    function drawGauge(value) {
        const canvas = document.getElementById('cnnGauge');
        const ctx = canvas.getContext('2d');
        canvas.width = 440; canvas.height = 220; ctx.scale(2, 2);
        ctx.clearRect(0, 0, 220, 110);
        ctx.beginPath(); ctx.arc(110, 100, 85, Math.PI, 0); ctx.lineWidth = 15; ctx.strokeStyle = '#333'; ctx.stroke();
        const grad = ctx.createLinearGradient(30, 0, 190, 0);
        grad.addColorStop(0, '#ff4d4d'); grad.addColorStop(0.5, '#f1c40f'); grad.addColorStop(1, '#2ecc71');
        ctx.beginPath(); ctx.arc(110, 100, 85, Math.PI, Math.PI + (Math.PI * (value / 100))); ctx.strokeStyle = grad; ctx.stroke();
    }

    updateAll();
    setInterval(updateAll, 300000); // 5分鐘自動刷新
</script>
</body>
</html>
