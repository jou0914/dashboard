<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投資戰情室 v7.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --bg: #000; --card: #1c1c1e; --text: #e0e0e0; --gold: #f1c40f; --alert: #ffcc00; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .dashboard { width: 100%; max-width: 380px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .card { background: var(--card); padding: 12px; border-radius: 16px; border-left: 4px solid #444; height: 135px; overflow: hidden; display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; height: 155px; }
        .card.up { border-left-color: var(--red); }
        .card.down { border-left-color: var(--green); }
        
        .label { font-size: 10px; color: #888; font-weight: 600; margin-bottom: 2px; }
        .main-val { font-size: 1.5rem; font-weight: 800; line-height: 1.1; }
        .sub-val { font-size: 0.8rem; font-weight: 600; margin-top: 2px; }
        .chart-container { width: 100%; height: 40px; margin-top: auto; position: relative; }
        
        .alert-hint { font-size: 9px; color: var(--alert); font-weight: bold; margin-top: 4px; }
        .gold-calc { font-size: 0.9rem; color: var(--gold); margin-top: 8px; font-weight: bold; border-top: 1px solid #333; padding-top: 5px; }
        
        .fng-area { grid-column: span 2; display: flex; flex-direction: column; align-items: center; background: var(--card); border-radius: 16px; padding: 15px; border-left: 4px solid var(--gold); margin-top: 5px; }
        .fng-gauge-wrapper { position: relative; width: 220px; height: 125px; }
        #fngValue { font-size: 2.8rem; font-weight: bold; position: absolute; bottom: 0; width: 100%; text-align: center; }
        
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 15px; }
        .btn-link { color: white; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50px; border-radius: 10px; font-size: 12px; font-weight: bold; text-align: center; }
        .btn-cnn { background: #cc0000; }
        .btn-vixtwn { background: #444; border: 1px solid #666; }
        .btn-sub { font-size: 8px; color: #ffcc00; font-weight: normal; margin-top: 2px; }

        .btn-refresh { background: #3367d6; color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; width: 100%; margin-top: 15px; font-size: 16px; cursor: pointer; grid-column: span 2; }
        #log-window { background: #111; padding: 10px; font-family: monospace; font-size: 9px; color: #00ff00; height: 80px; overflow-y: auto; width: 100%; max-width: 360px; border-radius: 10px; border: 1px solid #333; white-space: pre-wrap; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="card-twii" class="card">
        <div class="label">台股大盤 (^TWII)</div>
        <div id="p-twii" class="main-val">--</div>
        <div id="diff-twii" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-twii"></canvas></div>
    </div>
    <div id="card-7769" class="card">
        <div class="label">鴻勁 (7769.TW)</div>
        <div id="p-7769" class="main-val">--</div>
        <div id="diff-7769" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-7769"></canvas></div>
    </div>
    
    <div id="card-vix" class="card">
        <div class="label">美股 VIX 指數</div>
        <div id="p-vix" class="main-val">--</div>
        <div id="diff-vix" class="sub-val">--</div>
        <div class="alert-hint">指標: > 30</div>
        <div class="chart-container"><canvas id="chart-vix"></canvas></div>
    </div>

    <div id="card-usd_twd" class="card">
        <div class="label">USD / TWD</div>
        <div id="p-usd_twd" class="main-val">--</div>
        <div id="diff-usd_twd" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-usd_twd"></canvas></div>
    </div>
    <div id="card-usd_jpy" class="card">
        <div class="label">USD / JPY (日幣)</div>
        <div id="p-usd_jpy" class="main-val">--</div>
        <div id="diff-usd_jpy" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-usd_jpy"></canvas></div>
    </div>

    <div id="card-gold" class="card full-width">
        <div class="label">國際黃金 (盎司)</div>
        <div id="p-gold" class="main-val">--</div>
        <div id="diff-gold" class="sub-val">--</div>
        <div class="chart-container" style="height: 40px;"><canvas id="chart-gold"></canvas></div>
        <div id="calc-gold" class="gold-calc">換算中...</div>
    </div>

    <div class="fng-area">
        <div class="label">CRYPTO FEAR & GREED INDEX</div>
        <div class="fng-gauge-wrapper">
            <canvas id="cnnGauge"></canvas>
            <div id="fngValue">--</div>
        </div>
        <div id="fngStatus">--</div>
        <div class="alert-hint">指標: < 10</div>
        
        <div class="btn-row">
            <a href="https://www.cnn.com/markets/fear-and-greed" target="_blank" class="btn-link btn-cnn">
                CNN 恐慌指數
                <span class="btn-sub">指標: < 10</span>
            </a>
            <a href="https://www.wantgoo.com/index/vixtwn" target="_blank" class="btn-link btn-vixtwn">
                台股 VIX 網頁
                <span class="btn-sub">指標: > 40</span>
            </a>
        </div>
    </div>

    <button class="btn-refresh" onclick="updateAll()">FORCE REFRESH</button>
</div>

<div style="width:100%; max-width:360px; display:flex; justify-content:space-between; margin-top:15px;">
    <span style="font-size:10px; color:#888;">LOG CONSOLE</span>
    <button onclick="copyLog()" style="background:#444; color:#ccc; border:none; padding:3px 8px; border-radius:4px; font-size:10px; cursor:pointer;">COPY LOG</button>
</div>
<div id="log-window">Initializing v7.1...</div>

<script>
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyNlJGWxjsAK-uX34PxvTT3nFaezansCwcL9a7dvGS9ccOsFW8IviPc59WlVKshS9DzQg/exec';
    let charts = {};

    function addLog(msg) {
        const win = document.getElementById('log-window');
        win.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}\n` + win.innerHTML;
    }

    function copyLog() {
        const text = document.getElementById('log-window').innerText;
        navigator.clipboard.writeText(text).then(() => alert('Log 已複製'));
    }

    function renderSparkline(id, historyData, color) {
        const canvas = document.getElementById(`chart-${id}`);
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        if (charts[id]) charts[id].destroy();
        charts[id] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: historyData.map((_, i) => i),
                datasets: [{
                    data: historyData, borderColor: color, borderWidth: 2, pointRadius: 0, fill: true,
                    backgroundColor: (c) => {
                        const g = c.chart.ctx.createLinearGradient(0, 0, 0, 40);
                        g.addColorStop(0, color + '33'); g.addColorStop(1, color + '00'); return g;
                    },
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }

    function updateCard(id, data) {
        if (!data || data.error || !data.chart?.result) { addLog(`⚠️ ${id} 略過`); return null; }
        const res = data.chart.result[0];
        const m = res.meta;
        const price = m.regularMarketPrice;
        const diff = price - m.previousClose;
        const perc = (diff / m.previousClose) * 100;
        const color = diff >= 0 ? '#ff4d4d' : '#2ecc71';
        
        document.getElementById(`p-${id}`).innerText = price.toLocaleString(undefined, {minimumFractionDigits: (id==='usd_twd'||id==='usd_jpy')?2: (id==='7769'||id==='twii'?0:2)});
        document.getElementById(`p-${id}`).style.color = color;
        document.getElementById(`diff-${id}`).innerText = `${diff >= 0 ? '▲' : '▼'} ${Math.abs(diff).toFixed(2)} (${perc.toFixed(2)}%)`;
        document.getElementById(`diff-${id}`).style.color = color;
        document.getElementById(`card-${id}`).className = `card ${id==='gold'?'full-width':''} ${diff >= 0 ? 'up' : 'down'}`;

        try {
            const h = res.indicators.quote[0].close || [];
            const vh = h.filter(v => v !== null);
            if (vh.length > 0) renderSparkline(id, vh, color);
        } catch(e) {}
        return price;
    }

    async function updateAll() {
        addLog('正在連線抓取數據...');
        try {
            const res = await fetch(PROXY_URL);
            const data = await res.json();
            
            updateCard('twii', data.stock_twii);
            updateCard('7769', data.stock_7769);
            updateCard('vix', data.vix_index);
            updateCard('usd_jpy', data.usd_jpy);
            const twd = updateCard('usd_twd', data.usd_twd);
            const goldOz = updateCard('gold', data.gold_price);
            
            if (twd && goldOz) {
                const gPrice = (goldOz * twd) / 31.1035;
                document.getElementById('calc-gold').innerText = `換算：${Math.round(gPrice).toLocaleString()} NT$/g`;
            }
            if (data.crypto_fng?.data) {
                const val = parseInt(data.crypto_fng.data[0].value);
                document.getElementById('fngValue').innerText = val;
                document.getElementById('fngStatus').innerText = data.crypto_fng.data[0].value_classification.toUpperCase();
                drawGauge(val);
                addLog('✅ 全數據同步完成');
            }
        } catch (e) { addLog('❌ 連線異常'); }
    }

    function drawGauge(value) {
        const canvas = document.getElementById('cnnGauge');
        const ctx = canvas.getContext('2d');
        canvas.width = 440; canvas.height = 240; ctx.scale(2, 2);
        ctx.clearRect(0, 0, 220, 120);
        ctx.beginPath(); ctx.arc(110, 110, 90, Math.PI, 0); ctx.lineWidth = 18; ctx.strokeStyle = '#2a2a2e'; ctx.stroke();
        const grad = ctx.createLinearGradient(30, 0, 190, 0);
        grad.addColorStop(0, '#ff4d4d'); grad.addColorStop(0.5, '#f1c40f'); grad.addColorStop(1, '#2ecc71');
        ctx.beginPath(); ctx.arc(110, 110, 90, Math.PI, Math.PI + (Math.PI * (value / 100))); ctx.strokeStyle = grad; ctx.stroke();
    }
    updateAll();
</script>
</body>
</html>
