<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>每日財經儀表板 Pro v5.6</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --border: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --gold: #f5c842;
    --gold-dim: rgba(245,200,66,0.12);
    --green: #22c55e;
    --red: #ef4444;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; padding:15px; min-height:100vh; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:linear-gradient(rgba(255,255,255,0.01) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,0.01) 1px,transparent 1px);
    background-size:30px 30px;
  }
  .container { max-width:1200px; margin:0 auto; position:relative; z-index:1; }

  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
  .logo { font-family:'Space Mono',monospace; font-size:0.85rem; font-weight:700; color:var(--gold); }
  .clock { font-family:'Space Mono',monospace; font-size:0.72rem; color:var(--text-muted); background:var(--surface); border:1px solid var(--border); padding:5px 12px; border-radius:20px; }

  .section-title { font-size:0.62rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--text-muted); margin:28px 0 14px; display:flex; align-items:center; gap:10px; }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:12px; }

  /* 卡片樣式 */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; display:flex; flex-direction:column; gap:8px; transition:all 0.2s; position:relative; }
  .card:hover { border-color:rgba(245,200,66,0.3); }
  .card-label { font-size:0.72rem; color:var(--gold); font-weight:700; display:flex; justify-content:space-between; }
  .ticker { font-size:0.58rem; font-family:'Space Mono',monospace; color:var(--text-muted); background:rgba(255,255,255,0.05); padding:2px 6px; border-radius:4px; }
  .price { font-family:'Space Mono',monospace; font-size:1.6rem; font-weight:700; margin:4px 0; }
  .change { font-size:0.72rem; font-family:'Space Mono',monospace; }
  .up { color:var(--green); }
  .dn { color:var(--red); }
  
  canvas.sparkline { width:100%; height:50px; margin-top:10px; }

  /* 特殊卡片 */
  .tv-card { height:220px; padding:0; overflow:hidden; }
  .tv-card iframe { border:none; width:100%; height:100%; }
  .cnn-card { height:220px; overflow:hidden; display:flex; flex-direction:column; }
  .cnn-img-container { flex:1; display:flex; align-items:center; justify-content:center; background:#000; overflow:hidden; }
  .cnn-img-container img { width:110%; filter: invert(0.9) hue-rotate(180deg) brightness(1.1); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">FINANCIAL MONITOR <span>/ 核心資產 v5.6</span></div>
    <div id="clock" class="clock">--:--:--</div>
  </header>

  <div class="section-title">🚀 台股與波幅 (FinMind API)</div>
  <div class="grid" id="tw-grid"></div>

  <div class="section-title">🎭 市場情緒指標</div>
  <div class="grid">
    <div class="card cnn-card">
      <div class="card-label" style="padding:10px">CNN 恐慌與貪婪指數 <span class="ticker">CNN F&G</span></div>
      <div class="cnn-img-container">
        <img src="https://money.cnn.com/.element/img/5.0/sections/markets/greedandfear/v2/current_fearandgreed.png">
      </div>
    </div>
    <div class="card" id="card-VIX">
      <div class="card-label">美股波動率 <span class="ticker">VIX (Yahoo)</span></div>
      <div class="price" id="price-VIX">---</div>
      <div class="change" id="chg-VIX">載入中...</div>
    </div>
  </div>

  <div class="section-title">🌐 全球核心指標 (TradingView)</div>
  <div class="grid">
    <div class="card tv-card"><iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=FX_IDC%3AUSDTWD&theme=dark&autosize=true"></iframe></div>
    <div class="card tv-card"><iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=OANDA%3AXAUUSD&theme=dark&autosize=true"></iframe></div>
    <div class="card tv-card"><iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=NASDAQ%3ATLT&theme=dark&autosize=true"></iframe></div>
  </div>
</div>

<script>
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('zh-TW',{hour12:false}) + ' ' + (n.getMonth()+1)+'/'+n.getDate();
}
setInterval(updateClock, 1000); updateClock();

const TW_STOCKS = [
  { id:'7769', name:'鴻勁', color:'#f5c842' },
  { id:'Y9999', name:'台灣加權指數', color:'#60a5fa' },
  { id:'00679B', name:'元大美債20年', color:'#a78bfa' },
  { id:'VIXTW', name:'台股波動率', color:'#ef4444' }
];

async function fetchTW() {
  const grid = document.getElementById('tw-grid');
  for (const s of TW_STOCKS) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="card-label">${s.name} <span class="ticker">${s.id}</span></div>
      <div class="price" id="p-${s.id}">---</div>
      <div class="change" id="c-${s.id}">...</div>
      <canvas class="sparkline" id="s-${s.id}"></canvas>`;
    grid.appendChild(card);

    try {
      const res = await fetch(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${s.id}&start_date=${new Date(Date.now()-86400000*10).toISOString().split('T')[0]}`);
      const json = await res.json();
      const data = json.data.slice(-2);
      const cur = data[1].close, pre = data[0].close, diff = cur - pre, pct = (diff/pre*100).toFixed(2);
      document.getElementById(`p-${s.id}`).textContent = cur.toLocaleString();
      document.getElementById(`c-${s.id}`).textContent = `${diff>0?'+':''}${diff} (${diff>0?'+':''}${pct}%)`;
      document.getElementById(`c-${s.id}`).className = 'change ' + (diff>=0?'up':'dn');
    } catch(e) { console.error(e); }
  }
}

async function fetchVIX() {
  try {
    const res = await fetch('/api/vix');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    document.getElementById('price-VIX').textContent = data.price;
    const chgEl = document.getElementById('chg-VIX');
    chgEl.textContent = `${data.change>0?'+':''}${data.change} (${data.changePct}%)`;
    chgEl.className = 'change ' + (data.change>=0?'up':'dn');
  } catch(e) { 
    document.getElementById('chg-VIX').textContent = '暫無數據'; 
  }
}

fetchTW(); fetchVIX();
</script>
</body>
</html>
