<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易儀表板 v3</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --border: #2c2c2e; --text: #fff; --green: #30d158; --red: #ff453a; --gray: #8e8e93; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        .container { max-width: 480px; margin: auto; padding: 20px; padding-bottom: 120px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .sentiment-tag { font-size: 16px; font-weight: 600; padding: 6px 14px; border-radius: 20px; background: #2c2c2e; }
        .up { color: var(--green); background: rgba(48, 209, 88, 0.15); }
        .down { color: var(--red); background: rgba(255, 69, 58, 0.15); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .label { color: var(--gray); font-size: 13px; margin-bottom: 8px; display: block; }
        .value { font-size: 22px; font-weight: 700; }
        #log { position: fixed; bottom: 0; left: 0; right: 0; background: #111; color: #0f0; font-size: 10px; padding: 10px; max-height: 80px; overflow-y: auto; border-top: 1px solid #333; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>交易儀表板</h1><div id="sent" class="sentiment-tag">--</div></div>
        <div class="grid">
            <div class="card"><span class="label">CNN 恐慌指數</span><div id="cnn" class="value">--</div></div>
            <div class="card"><span class="label">美股 VIX</span><div id="vix" class="value">--</div></div>
        </div>
        <div class="card">
            <div style="display:flex; justify-content:space-between;">
                <div><span class="label">USD / TWD</span><div id="twd" class="value">--</div></div>
                <div style="text-align:right;"><span class="label">台指 VIX</span><div id="vixtw" class="value">--</div></div>
            </div>
        </div>
        <div class="grid">
            <div class="card"><span class="label">融資變化 (億)</span><div id="m" class="value">--</div></div>
            <div class="card"><span class="label">融券變化 (張)</span><div id="s" class="value">--</div></div>
        </div>
    </div>
    <div id="log">系統初始化...</div>

    <script>
        const API_BASE = "https://dashboard.jou0914.workers.dev"; 

        function log(msg) {
            const l = document.getElementById("log");
            l.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + l.innerHTML;
        }

        async function update() {
            log("正在抓取數據...");
            try {
                const res = await fetch(`${API_BASE}/market`);
                const d = await res.json();
                
                document.getElementById("cnn").textContent = d.cnn ?? "--";
                document.getElementById("vix").textContent = d.vix?.toFixed(2) ?? "--";
                document.getElementById("vixtw").textContent = d.vixtw?.toFixed(2) ?? "--";
                document.getElementById("twd").textContent = d.twd?.toFixed(2) ?? "--";

                if (d.marginChange) {
                    const m = d.marginChange / 100000000;
                    document.getElementById("m").textContent = (m > 0 ? "+" : "") + m.toFixed(2);
                    document.getElementById("m").style.color = m > 0 ? "var(--green)" : "var(--red)";
                }
                if (d.shortChange) {
                    document.getElementById("s").textContent = (d.shortChange > 0 ? "+" : "") + d.shortChange.toLocaleString();
                }

                const s = document.getElementById("sent");
                s.textContent = d.sentiment || "中性";
                s.className = "sentiment-tag " + (d.sentiment === "偏多" ? "up" : (d.sentiment === "偏空" ? "down" : ""));
                
                log("更新成功");
            } catch (e) {
                log("錯誤: " + e.message);
            }
        }

        update();
        setInterval(update, 60000); // 建議改為 1 分鐘，避免 Alpha Vantage 免費版次數用光
    </script>
</body>
</html>
