<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7769 鴻勁 股價監測 (Debug版)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #fff; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; margin-bottom: 20px; }
        h1 { color: #333; margin: 0; }
        .symbol { color: #666; font-size: 0.9rem; margin-bottom: 1rem; }
        .price { font-size: 3.5rem; font-weight: bold; color: #e74c3c; margin: 10px 0; }
        .info { display: flex; justify-content: space-between; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .update-btn { margin-top: 20px; padding: 12px 25px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; width: 100%; }
        .update-btn:hover { background: #0056b3; }
        #status { font-size: 0.8rem; color: #888; margin-top: 10px; }
        
        /* Debug Log 樣式 */
        .debug-container { width: 90%; max-width: 500px; background: #222; color: #00ff00; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; overflow-x: auto; box-shadow: inset 0 0 10px #000; }
        .debug-title { color: #fff; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="card">
    <h1>鴻勁</h1>
    <div class="symbol">7769.TPE</div>
    <div id="price" class="price">--.--</div>
    <div id="status">等待更新...</div>
    
    <div class="info">
        <div>開盤: <strong id="open">--</strong></div>
        <div>最高: <strong id="high">--</strong></div>
    </div>
    
    <button class="update-btn" onclick="fetchStockData()">更新行情</button>
</div>

<div class="debug-container">
    <div class="debug-title">
        <span>Debug Log (API 回傳紀錄)</span>
        <span style="cursor:pointer" onclick="document.getElementById('log').innerText=''">清除</span>
    </div>
    <div id="log">尚未有資料紀錄...</div>
</div>

<script>
    const API_KEY = '12F9YHGH3T1063OB';
    const SYMBOL = '7769.TPE';

    async function fetchStockData() {
        const priceEl = document.getElementById('price');
        const statusEl = document.getElementById('status');
        const logEl = document.getElementById('log');
        
        statusEl.innerText = '正在連線至 Alpha Vantage...';
        logEl.innerText = `[${new Date().toLocaleTimeString()}] 發送請求至: ${SYMBOL}\n` + logEl.innerText;

        try {
            // 使用 Global Quote 函數
            const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${SYMBOL}&apikey=${API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();

            // 記錄原始回傳內容到 Debug Log
            logEl.innerText = `[回傳數據]: ${JSON.stringify(data)}\n\n` + logEl.innerText;

            if (data["Note"]) {
                statusEl.innerText = '錯誤：達到 API 呼叫頻率限制 (每分鐘5次)';
                return;
            }

            const quote = data["Global Quote"];
            
            if (quote && quote["05. price"]) {
                priceEl.innerText = parseFloat(quote["05. price"]).toFixed(2);
                document.getElementById('open').innerText = parseFloat(quote["02. open"]).toFixed(2);
                document.getElementById('high').innerText = parseFloat(quote["03. high"]).toFixed(2);
                statusEl.innerText = `更新成功: ${quote["07. latest trading day"]}`;
            } else if (data["Error Message"]) {
                statusEl.innerText = '代碼無效或格式錯誤';
            } else {
                statusEl.innerText = '此代碼目前無資料 (查無 7769.TPE)';
                // 嘗試另一個可能的後綴
                logEl.innerText = `[提示]: 若 7769.TPE 無資料，可能是 Alpha Vantage 尚未收錄此新股。\n` + logEl.innerText;
            }

        } catch (error) {
            logEl.innerText = `[錯誤]: ${error.message}\n` + logEl.innerText;
            statusEl.innerText = '網路連線失敗';
        }
    }

    // 頁面載入後自動執行一次
    window.onload = fetchStockData;
</script>

</body>
</html>
