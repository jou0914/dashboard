<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>VIX 即時指數</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
    }
    h1 { font-size: 1.2rem; color: #aaa; margin-bottom: 4px; }
    #p2 { font-size: 3rem; font-weight: bold; color: #f0c040; }
    #m2 { font-size: 0.85rem; color: #666; margin-bottom: 20px; }
    canvas { max-width: 800px; width: 100%; }
  </style>
</head>
<body>

  <h1>CBOE VIX 恐慌指數</h1>
  <div id="p2">--</div>
  <div id="m2">載入中...</div>
  <canvas id="vixChart"></canvas>
  
<script>
  const ctx = document.getElementById("vixChart").getContext("2d");

  const chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: [],
      datasets: [{
        label: "VIX",
        data: [],
        borderColor: "#f0c040",
        backgroundColor: "rgba(240,192,64,0.08)",
        borderWidth: 2,
        pointRadius: 2,
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      animation: false,
      scales: {
        x: {
          ticks: { color: "#888", maxTicksLimit: 8 },
          grid: { color: "#222" }
        },
        y: {
          ticks: { color: "#888" },
          grid: { color: "#222" }
        }
      },
      plugins: {
        legend: { display: false }
      }
    }
  });

  async function fetchVix() {
    try {
      const res = await fetch("https://dashboard.jou0914.workers.dev/vix");
      const data = await res.json();

      if (data.price) {
        document.getElementById("p2").textContent = data.price.toFixed(2);
        document.getElementById("m2").textContent = "即時：" + data.time;

        // 載入歷史資料
        chart.data.labels = data.history.map(d => d.date);
        chart.data.datasets[0].data = data.history.map(d => d.price);
        chart.update();
      }
    } catch (e) {
      document.getElementById("m2").textContent = "連線失敗";
    }
  }

  fetchVix();
  setInterval(fetchVix, 30000);
</script>

</body>
</html>
