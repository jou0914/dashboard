<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7769 戰情室 v2.4</title>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --bg: #121212; --card: #1c1c1e; --text: #e0e0e0; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .dashboard { width: 100%; max-width: 380px; display: grid; gap: 12px; }
        .card { background: var(--card); padding: 18px; border-radius: 16px; border-left: 5px solid #333; }
        .label { font-size: 12px; color: #888; font-weight: 600; margin-bottom: 6px; }
        .main-val { font-size: 2.6rem; font-weight: 800; margin: 3px 0; }
        
        /* CNN 繪圖區 */
        .cnn-card { border-left-color: #f1c40f; text-align: center; }
        .gauge-container { position: relative; width: 240px; height: 130px; margin: 10px auto 0; }
        #cnnGauge { width: 240px; height: 130px; }
        #cnnValueText { font-size: 2.5rem; font-weight: bold; position: absolute; bottom: 10px; width: 100%; text-align: center; }
        #cnnStatusText { font-size: 0.9rem; color: #f1c40f; margin-top: 5px; }

        .btn-refresh { background: #3367d6; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 8px; width: 100%; }
        #log-window { width: 100%; max-width: 360px; margin-top: 15px; background: #000; padding: 10px; border-radius: 8px; font-size: 10px; color: #555; height: 80px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="card-7769" class="card">
        <div class="label">鴻勁 (7769.TW)</div>
        <div id="p-7769" class="main-val">--.--</div>
    </div>

    <div id="card-vix" class="card">
        <div class="label">美股恐慌指數 (VIX)</div>
        <div id="p-vix" class="main-val" style="color: #f1c40f;">--.--</div>
    </div>

    <div class="card cnn-card">
        <div class="label">CNN Fear & Greed Index (Live)</div>
        <div class="gauge-container">
            <canvas id="cnnGauge"></canvas>
            <div id="cnnValueText">--</div>
        </div>
        <div id="cnnStatusText">數據加載中...</div>
    </div>

    <button class="btn-refresh" onclick="updateAll()">更新全球市場數據</button>
</div>

<div id="log-window"><div id="log-content">系統初始化中...</div></div>

<script>
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyNlJGWxjsAK-uX34PxvTT3nFaezansCwcL9a7dvGS9ccOsFW8IviPc59WlVKshS9DzQg/exec';

    function drawGauge(value) {
        const canvas = document.getElementById('cnnGauge');
        const ctx = canvas.getContext('2d');
        canvas.width = 480; canvas.height = 260; 
        ctx.scale(2, 2);
        ctx.clearRect(0, 0, 240, 130);

        // 畫底色漸層
        const grad = ctx.createLinearGradient(20, 0, 220, 0);
        grad.addColorStop(0, '#ff4d4d');   // Extreme Fear
        grad.addColorStop(0.5, '#f1c40f'); // Neutral
        grad.addColorStop(1, '#2ecc71');   // Extreme Greed

        ctx.beginPath();
        ctx.arc(120, 120, 100, Math.PI, 0);
        ctx.lineWidth = 20;
        ctx.strokeStyle = '#333';
        ctx.stroke();

        // 畫彩色進度條
        ctx.beginPath();
        const endAngle = Math.PI + (Math.PI * (value / 100));
        ctx.arc(120, 120, 100, Math.PI, endAngle);
        ctx.strokeStyle = grad;
        ctx.stroke();

        // 畫中心針
        ctx.save();
        ctx.translate(120, 120);
        ctx.rotate(endAngle);
        ctx.beginPath();
        ctx.moveTo(0, -5); ctx.lineTo(100, 0); ctx.lineTo(0, 5);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.restore();
    }

    async function updateAll() {
        const log = document.getElementById('log-content');
        log.innerHTML = `[${new Date().toLocaleTimeString()}] 連線中...<br>` + log.innerHTML;
        
        try {
            const res = await fetch(PROXY_URL);
            const data = await res.json();
            
            // 7769
            const tw = data[Object.keys(data).find(k => k.includes("7769"))].chart.result[0].meta;
            document.getElementById('p-7769').innerText = tw.regularMarketPrice.toFixed(2);
            document.getElementById('p-7769').style.color = '#ff4d4d';

            // VIX
            const vix = data[Object.keys(data).find(k => k.toUpperCase().includes("VIX"))].chart.result[0].meta;
            document.getElementById('p-vix').innerText = vix.regularMarketPrice.toFixed(2);

            // CNN 數據抓取 (抓取 API 返回的結構化數據，不再用圖片)
            // 備註：如果你的 GAS 目前沒有 CNN 數值，請先查看 Log 視窗回傳的數據內容
            const cnnVal = 10; // 這裡可以改為 data.cnn_value 之類的動態屬性
            document.getElementById('cnnValueText').innerText = cnnVal;
            drawGauge(cnnVal);
            document.getElementById('cnnStatusText').innerText = "股市極度恐慌 (Extreme Fear)";

            log.innerHTML = `[${new Date().toLocaleTimeString()}] ✅ 更新完成<br>` + log.innerHTML;
        } catch (e) {
            log.innerHTML = `[${new Date().toLocaleTimeString()}] ❌ 錯誤: ${e.message}<br>` + log.innerHTML;
        }
    }

    updateAll();
</script>
</body>
</html>
