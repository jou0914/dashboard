<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市場核心監控 v1.8.2</title>
    <style>
        :root { --up: #48bb78; --down: #ff4d4d; --bg: #000; --card: #0c0c0c; }
        body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 150px; }
        .ver { text-align: right; font-size: 10px; color: #222; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--card); border: 1px solid #1a1a1a; border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .full { grid-column: span 2; }
        .label { font-size: 10px; color: #444; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; display: block; }
        .price { font-size: 2.5rem; font-weight: 900; line-height: 1; }
        .change { font-size: 1rem; font-weight: bold; margin-top: 10px; display: flex; align-items: center; }
        .up { color: var(--up); } .up::before { content: '▲ '; }
        .down { color: var(--down); } .down::before { content: '▼ '; }
        .cnn-val { font-size: 3.5rem; font-weight: 900; color: #ff4d4d; line-height: 1; }
        #debug-panel { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5,5,5,0.9); padding: 10px; font-size: 10px; height: 100px; overflow-y: auto; border-top: 1px solid #222; backdrop-filter: blur(5px); }
        .log-line { margin-bottom: 2px; } .err { color: var(--down); } .ok { color: var(--up); }
    </style>
</head>
<body>
<div class="container">
    <div class="ver">SYSTEM CORE v1.8.2</div>
    <div class="grid">
        <div class="card full" style="border-left: 4px solid #ff4d4d;"><span class="label">CNN Fear & Greed</span><div id="p-cnn" class="cnn-val">--</div><div id="m-cnn" style="font-size:12px; color:#333; font-weight:bold;">LOADING...</div></div>
        <div class="card"><span class="label">VIX US</span><div id="p-vix" class="price" style="color: #f0c040;">--</div><div id="c-vix" class="change">--</div></div>
        <div class="card"><span class="label">VIX TW</span><div id="p-vtw" class="price" style="color: #40a0f0;">--</div><div id="c-vtw" class="change">--</div></div>
        <div class="card full"><span class="label">USD / TWD</span><div id="p-twd" class="price" style="color: #a084ff;">--</div><div id="c-twd" class="change">--</div></div>
        <div class="card full"><span class="label">7769.TW 鴻勁</span><div id="p-7769" class="price" style="color: #48bb78;">--</div><div id="c-7769" class="change">--</div></div>
    </div>
</div>
<div id="debug-panel"><div id="log-content"></div></div>
<script>
    const API = "https://dashboard.jou0914.workers.dev";
    const addLog = (m, e=false) => { 
        const l = document.getElementById('log-content');
        l.innerHTML = `<div class="log-line ${e?'err':'ok'}">[${new Date().toLocaleTimeString()}] ${m}</div>` + l.innerHTML;
    };
    async function refresh() {
        const update = async (path, id, fix=2) => {
            try {
                const r = await fetch(API + path);
                const d = await r.json();
                if (path === "/cnn") {
                    document.getElementById("p-cnn").textContent = d.price;
                    document.getElementById("m-cnn").textContent = d.label;
                } else if (d.price) {
                    document.getElementById(`p-${id}`).textContent = (id === '7769') ? d.price.toLocaleString() : d.price.toFixed(fix);
                    const cEl = document.getElementById(`c-${id}`);
                    cEl.textContent = `${d.change.toFixed(2)}%`;
                    cEl.className = `change ${d.isUp ? 'up' : 'down'}`;
                }
                addLog(`${id} OK`);
            } catch (e) { addLog(`${id} ERROR`, true); }
        };
        await update('/cnn', 'cnn'); await update('/vix', 'vix'); await update('/vixtw', 'vtw'); await update('/twd', 'twd', 3); await update('/7769', '7769');
    }
    refresh(); setInterval(refresh, 60000);
</script>
</body>
</html>
