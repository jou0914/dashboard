<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY DAILY BRIEF | 核心資產監控 v6.4</title>
    <style>
        :root { --bg:#0a0a0a; --card:#161616; --border:#262626; --text:#ffffff; --muted:#888888; --red:#f56565; --green:#48bb78; --yellow:#f6ad55; }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:20px;}
        header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:12px;}
        .logo{font-weight:bold;letter-spacing:1px;} .logo span{color:var(--yellow);}
        .time{color:var(--muted);font-size:0.9rem;font-family:monospace;}
        .sec{font-size:0.75rem;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em;}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px, 1fr));gap:16px;margin-bottom:32px;}
        .card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;}
        .card-hd{font-size:0.8rem;color:var(--muted);margin-bottom:8px;}
        .price{font-size:2rem;font-weight:bold;margin:8px 0;}
        .chg{font-size:0.9rem;font-weight:500;} .meta{font-size:0.7rem;color:var(--muted);margin-top:8px;}
        canvas.spark{width:100%;height:45px;display:block;margin-top:10px;border-radius:4px;}
        .gauge-wrap{height:4px;border-radius:2px;margin:12px 0 4px;position:relative;background:linear-gradient(to right,var(--green),var(--yellow),var(--red));}
        .needle{width:4px;height:12px;background:white;position:absolute;top:-4px;border-radius:2px;transition:left 0.5s ease;}
        .memo-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
        @media(max-width:600px){.memo-grid{grid-template-columns:1fr;}}
        .memo{background:rgba(255,255,255,0.02);border-radius:4px;padding:12px;font-size:0.8rem;}
        .memo-title{color:var(--yellow);margin-bottom:8px;font-weight:bold;}
        .memo-item{color:var(--muted);margin-bottom:4px;}
    </style>
</head>
<body>
<header>
    <div class="logo">MY DAILY BRIEF / <span>核心資產監控系統 v6.4</span></div>
    <div class="time" id="clock">--:--:-- --/--</div>
</header>

<div class="sec">🚀 核心追蹤 (含鴻勁 7769)</div>
<div class="grid" id="tw-grid"></div>

<div class="sec">🌎 全球核心指標</div>
<div class="grid" id="global-grid"></div>

<div class="sec">🎭 市場情緒指標</div>
<div class="grid">
    <div class="card">
        <div class="card-hd">加密恐懼貪婪 F&G</div>
        <div id="fg-num" class="price">--</div>
        <div id="fg-lbl" class="chg">載入中…</div>
        <div class="gauge-wrap"><div id="fg-needle" class="needle" style="left:50%"></div></div>
    </div>
    <div class="card">
        <div class="card-hd">美股波動率 VIX</div>
        <div id="vix-num" class="price">--</div>
        <div id="vix-lbl" class="chg">載入中…</div>
        <div class="gauge-wrap"><div id="vix-needle" class="needle" style="left:30%"></div></div>
    </div>
    <div class="card">
        <div class="card-hd">台股波動率 VIXTW</div>
        <div id="vixtw-num" class="price">--</div>
        <div id="vixtw-lbl" class="chg">載入中…</div>
        <div class="gauge-wrap"><div id="vixtw-needle" class="needle" style="left:50%"></div></div>
        <div id="vixtw-meta" class="meta"></div>
    </div>
</div>

<div class="sec">💡 財經備忘錄</div>
<div class="memo-grid">
    <div class="memo">
        <div class="memo-title">2025-26 節稅提醒</div>
        <div class="memo-item">· 綜所稅 5 月申報，注意列舉扣除額。</div>
        <div class="memo-item">· 股利所得選合併 (8.5% 抵減) 或分開計稅。</div>
    </div>
    <div class="memo">
        <div class="memo-title">投資策略備忘</div>
        <div class="memo-item">· 監控 7769 鴻勁趨勢。</div>
        <div class="memo-item">· 美債 ETF 分批佈局，注意匯率風險。</div>
    </div>
</div>

<script>
// 時鐘功能
function updateClock(){
    const n=new Date();
    document.getElementById('clock').textContent = n.toLocaleTimeString('zh-TW',{hour12:false})+' '+((n.getMonth()+1).toString().padStart(2,'0'))+'/'+n.getDate().toString().padStart(2,'0');
}
setInterval(updateClock,1000); updateClock();

// 繪製趨勢圖
function drawSpark(id,prices,up){
    const c=document.getElementById('sp-'+id); if(!c||!prices||prices.length<2) return;
    const dpr=window.devicePixelRatio||1, w=c.offsetWidth, h=c.offsetHeight;
    c.width=w*dpr; c.height=h*dpr; const ctx=c.getContext('2d'); ctx.scale(dpr,dpr);
    const mn=Math.min(...prices), mx=Math.max(...prices), rng=(mx-mn)||1;
    const pts=prices.map((p,i)=>({x:2+(i/(prices.length-1))*(w-4), y:4+(h-8)-((p-mn)/rng)*(h-8)}));
    ctx.beginPath(); ctx.strokeStyle=up?'#48bb78':'#f56565'; ctx.lineWidth=1.5;
    pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke();
}

function makeCard(id,title){
    const div=document.createElement('div'); div.className='card';
    div.innerHTML=`<div class="card-hd">${title}</div><div id="p-${id}" class="price">--</div><div id="c-${id}" class="chg">載入中…</div><canvas class="spark" id="sp-${id}"></canvas><div id="m-${id}" class="meta"></div>`;
    return div;
}

function setCard(id,price,chg,pct,meta,prices,dec=2){
    const up=chg>=0, col=up?'var(--green)':'var(--red)';
    const pEl=document.getElementById('p-'+id), cEl=document.getElementById('c-'+id);
    if(!pEl||!cEl) return;
    pEl.textContent=price.toLocaleString('zh-TW',{minimumFractionDigits:dec}); pEl.style.color=col;
    cEl.textContent=`${up?'+':''}${chg.toFixed(dec)} (${up?'+':''}${pct.toFixed(2)}%)`; cEl.style.color=col;
    if(document.getElementById('m-'+id)) document.getElementById('m-'+id).textContent=meta;
    if(prices) setTimeout(()=>drawSpark(id,prices,up), 100);
}

// 數據抓取
async function fetchFM(dataset,id){
    const r=await fetch(`https://api.finmindtrade.com/api/v4/data?dataset=${dataset}&data_id=${id}&start_date=${new Date(Date.now()-30*86400000).toISOString().split('T')[0]}`);
    const j=await r.json(); return j.data;
}

// 初始化台股
const twGrid=document.getElementById('tw-grid');
[{id:'7769',name:'鴻勁 7769:TPE'},{id:'TAIEX',name:'加權指數'},{id:'00679B',name:'元大美債20年'}].forEach(s=>{
    twGrid.appendChild(makeCard(s.id,s.name));
    fetchFM('TaiwanStockPrice',s.id).then(d=>{
        const p=d.map(r=>parseFloat(r.close)).slice(-30);
        const cur=p[p.length-1], pre=p[p.length-2];
        setCard(s.id,cur,cur-pre,(cur-pre)/pre*100,`更新：${d[d.length-1].date}`,p);
    }).catch(()=>document.getElementById('c-'+s.id).textContent='連線失敗');
});

// 情緒指標 (F&G, VIX)
fetch('https://api.alternative.me/fng/?limit=1').then(r=>r.json()).then(j=>{
    const v=parseInt(j.data[0].value);
    document.getElementById('fg-num').textContent=v;
    document.getElementById('fg-lbl').textContent=j.data[0].value_classification;
    document.getElementById('fg-needle').style.left=v+'%';
});

// VIXTW 透過您的 Cloudflare API
async function updateVIXTW(){
    try{
        const r=await fetch('/api/vixtw'); const d=await r.json();
        document.getElementById('vixtw-num').textContent=d.price.toFixed(2);
        document.getElementById('vixtw-lbl').textContent=d.price>25?'警戒':'穩定';
        document.getElementById('vixtw-needle').style.left=Math.min(Math.max((d.price-10)/30*100,0),100)+'%';
        document.getElementById('vixtw-meta').textContent='更新：'+d.date;
    }catch(e){ document.getElementById('vixtw-lbl').textContent='等待有效數據'; }
}
updateVIXTW();
</script>
</body>
</html>
