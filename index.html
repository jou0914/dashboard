<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球波動率監控儀表板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      margin: 0;
    }
    .header { width: 100%; max-width: 800px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
    .header h1 { font-size: 1.2rem; color: #888; margin: 0; }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
      width: 100%;
      max-width: 800px;
      margin-bottom: 20px;
    }
    
    .card {
      background: #161616;
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    
    .label { font-size: 0.85rem; color: #888; margin-bottom: 8px; font-weight: bold; }
    .price { font-size: 2.8rem; font-weight: bold; line-height: 1; }
    .us-vix { color: #f0c040; } /* 原本的 CBOE 金色 */
    .tw-vix { color: #40a0f0; } /* 台股藍色 */
    .meta { font-size: 0.75rem; color: #555; margin-top: 10px; }
    
    .chart-container {
      background: #161616;
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 15px;
      width: 100%;
      max-width: 800px;
      box-sizing: border-box;
    }
    canvas { width: 100% !important; }
  </style>
</head>
<body>

  <div class="header">
    <h1>MARKET VOLATILITY INDEX</h1>
  </div>

  <div class="grid">
    <div class="card">
      <div class="label">CBOE VIX (美股恐慌指數)</div>
      <div id="p-us" class="price us-vix">--</div>
      <div id="m-us" class="meta">載入中...</div>
    </div>

    <div class="card">
      <div class="label">VIXTWN (台股波動率)</div>
      <div id="p-tw" class="price tw-vix">--</div>
      <div id="m-tw" class="meta">等待數據...</div>
    </div>
  </div>

  <div class="chart-container">
    <div style="font-size: 0.8rem; color: #555; margin-bottom: 10px;">CBOE VIX 90日趨勢圖</div>
    <canvas id="vixChart"></canvas>
  </div>
  
<script>
  const WORKER_URL = "https://dashboard.jou0914.workers.dev";
  const ctx = document.getElementById("vixChart").getContext("2d");

  // 初始化圖表 (保留原本美觀的樣式)
  const chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: [],
      datasets: [{
        label: "VIX",
        data: [],
        borderColor: "#f0c040",
        backgroundColor: "rgba(240,192,64,0.08)",
        borderWidth: 2,
        pointRadius: 0,
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#444", maxTicksLimit: 6 }, grid: { display: false } },
        y: { ticks: { color: "#444" }, grid: { color: "#222" } }
      }
    }
  });

  async function updateDashboard() {
    // 1. 抓取美股 VIX 並更新圖表
    try {
      const resUs = await fetch(`${WORKER_URL}/vix`);
      const dataUs = await resUs.json();
      if (dataUs.price) {
        document.getElementById("p-us").textContent = dataUs.price.toFixed(2);
        document.getElementById("m-us").textContent = "Update: " + dataUs.time;
        
        chart.data.labels = dataUs.history.map(h => h.date);
        chart.data.datasets[0].data = dataUs.history.map(h => h.price);
        chart.update();
      }
    } catch (e) { console.error("US VIX Error"); }

    // 2. 抓取台股 VIX (使用剛剛修復好的 /vixtw 路由)
    try {
      const resTw = await fetch(`${WORKER_URL}/vixtw`);
      const dataTw = await resTw.json();
      if (dataTw.price > 0) {
        document.getElementById("p-tw").textContent = dataTw.price.toFixed(2);
        document.getElementById("m-tw").textContent = "最後更新：" + dataTw.time;
      } else {
        document.getElementById("m-tw").textContent = "台股收盤中 / 無數據";
      }
    } catch (e) { console.error("TW VIX Error"); }
  }

  updateDashboard();
</script>
</body>
</html>
