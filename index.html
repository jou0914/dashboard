<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7769 鴻勁 監控 v1.5</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #fff; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        .price { font-size: 3.5rem; font-weight: bold; color: #333; margin: 15px 0; }
        .btn { background: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .debug-box { width: 320px; margin-top: 20px; background: #222; color: #0f0; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; }
        #log { height: 100px; overflow-y: auto; white-space: pre-wrap; margin-top: 10px; border-top: 1px solid #444; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 10px; color: #ccc;">v1.5 (Backend Relay)</div>
    <h2 style="margin:0">鴻勁 7769</h2>
    <div id="price" class="price">--.--</div>
    <div id="status" style="font-size:12px; color: #666; margin-bottom: 15px;">初始化中...</div>
    <button class="btn" onclick="fetchData()">刷新數據</button>
</div>

<div class="debug-box">
    <div style="display:flex; justify-content:space-between">
        <span>DEBUG LOG</span>
        <button onclick="copyLog()" style="font-size:10px">複製</button>
    </div>
    <div id="log"></div>
</div>

<script>
    // ⚠️ 請填入你在第一步取得的 GAS 網址
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbxi2Xm_MZ1Bak8sAIfC-MiPaHERwuqpz8eSh8yRUy5efO8sa6Mur_XJ95BHhqYtKnJ7ww/exec';

    function addLog(msg) {
        document.getElementById('log').innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}\n` + document.getElementById('log').innerHTML;
    }

    async function fetchData() {
        if (!PROXY_URL.startsWith('http')) {
            addLog("錯誤: 未填入代理網址");
            return;
        }

        document.getElementById('status').innerText = "透過中繼站抓取中...";
        addLog("正在請求中繼站...");

        try {
            const response = await fetch(PROXY_URL);
            const data = await response.json();
            
            const meta = data.chart.result[0].meta;
            const price = meta.regularMarketPrice;
            
            document.getElementById('price').innerText = price.toFixed(2);
            document.getElementById('price').style.color = price >= meta.previousClose ? "#e74c3c" : "#2ecc71";
            document.getElementById('status').innerText = "更新成功";
            addLog(`✅ 成功取得價格: ${price}`);
        } catch (err) {
            addLog(`❌ 失敗: ${err.message}`);
            document.getElementById('status').innerText = "抓取失敗";
        }
    }

    function copyLog() {
        navigator.clipboard.writeText(document.getElementById('log').innerText);
        alert("已複製");
    }

    fetchData();
</script>
</body>
</html>
