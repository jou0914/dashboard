<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7769 鴻勁 監控面板 (備案版)</title>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 400px; }
        .card { background: #fff; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h2 { margin: 0 0 10px 0; font-size: 1.2rem; color: #1a73e8; }
        
        /* Google Finance 嵌入樣式 */
        .finance-widget { width: 100%; height: 180px; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        
        /* Debug Log 樣式 */
        .debug-section { background: #202124; color: #34a853; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 12px; }
        .debug-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; color: #fff; border-bottom: 1px solid #3c4043; padding-bottom: 5px; }
        #log-content { height: 150px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
        
        .btn { background: #1a73e8; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn:hover { background: #1557b0; }
        .btn-copy { background: #5f6368; }
        
        .status-tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; background: #feefc3; color: #e37400; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>7769 鴻勁 (即時行情備案)</h2>
        <div class="status-tag">Google Finance 數據源 (無需 API)</div>
        <div class="finance-widget">
            <iframe 
                src="https://www.google.com/finance/quote/7769:TPE" 
                style="width:100%; height:100%; border:none; transform: scale(1); transform-origin: 0 0;"
                title="Google Finance">
            </iframe>
        </div>
        <p style="font-size: 12px; color: #666; margin-top: 8px;">※ 若上方空白，請點擊下方按鈕另開視窗</p>
        <button class="btn" onclick="window.open('https://www.google.com/finance/quote/7769:TPE')">開啟詳細圖表</button>
    </div>

    <div class="debug-section">
        <div class="debug-header">
            <span>API Debug Log</span>
            <div>
                <button class="btn btn-copy" onclick="copyLog()">一鍵複製 Log</button>
                <button class="btn btn-copy" onclick="clearLog()" style="margin-left:5px">清除</button>
            </div>
        </div>
        <div id="log-content">等待 API 請求紀錄...</div>
    </div>
</div>

<script>
    const API_KEY = '12F9YHGH3T1063OB';
    const SYMBOL = '7769.TPE';
    const logContent = document.getElementById('log-content');

    function addLog(msg) {
        const time = new Date().toLocaleTimeString();
        logContent.innerHTML = `[${time}] ${msg}\n` + logContent.innerHTML;
    }

    async function fetchAlphaVantage() {
        addLog(`正在嘗試抓取 Alpha Vantage: ${SYMBOL}...`);
        try {
            const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${SYMBOL}&apikey=${API_KEY}`;
            const response = await fetch(url);
            const data = await response.json();
            
            addLog(`回傳數據: ${JSON.stringify(data)}`);
            
            if (data["Global Quote"] && Object.keys(data["Global Quote"]).length === 0) {
                addLog("⚠️ 警訊: Alpha Vantage 資料庫尚未收錄此代碼。");
            }
        } catch (e) {
            addLog(`❌ 錯誤: ${e.message}`);
        }
    }

    function copyLog() {
        const text = logContent.innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Log 已成功複製到剪貼簿！");
        });
    }

    function clearLog() {
        logContent.innerText = "已清除紀錄";
    }

    // 執行檢測
    fetchAlphaVantage();
</script>

</body>
</html>
