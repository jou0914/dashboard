<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY DAILY BRIEF | 核心資產監控 v6.5 Debug</title>
    <style>
        :root { --bg:#0a0a0a; --card:#161616; --border:#262626; --text:#ffffff; --muted:#888888; --red:#f56565; --green:#48bb78; --yellow:#f6ad55; }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);font-family:sans-serif;padding:20px;padding-bottom:150px;}
        header{display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:20px;}
        .sec{font-size:0.7rem;color:var(--muted);margin:15px 0 10px;text-transform:uppercase;}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;}
        .card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:15px;}
        .price{font-size:1.8rem;font-weight:bold;margin:5px 0;}
        .meta{font-size:0.7rem;color:var(--muted);margin-top:5px;}
        .gauge-wrap{height:4px;background:#333;margin:10px 0;position:relative;border-radius:2px;}
        .needle{width:4px;height:10px;background:#fff;position:absolute;top:-3px;transition:0.5s;}
        
        /* Debug Console Style */
        #debug-console {
            position: fixed; bottom: 0; left: 0; right: 0; height: 120px;
            background: rgba(0,0,0,0.9); border-top: 2px solid var(--yellow);
            color: #00ff00; font-family: monospace; font-size: 0.7rem;
            padding: 10px; overflow-y: auto; z-index: 9999;
        }
        .log-err { color: var(--red); }
        .log-ok { color: var(--green); }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold">MY DAILY BRIEF / <span style="color:var(--yellow)">v6.5 DEBUG</span></div>
    <div id="clock" style="color:var(--muted);font-family:monospace">--:--:--</div>
</header>

<div class="sec">🚀 核心追蹤</div>
<div class="grid" id="tw-grid"></div>

<div class="sec">🎭 情緒指標</div>
<div class="grid">
    <div class="card">
        <div>台股波動率 VIXTW</div>
        <div id="vix-val" class="price">--</div>
        <div id="vix-status" style="font-size:0.8rem">偵測中...</div>
        <div class="gauge-wrap" style="background:linear-gradient(to right,var(--green),var(--yellow),var(--red))">
            <div id="vix-needle" class="needle" style="left:50%"></div>
        </div>
    </div>
</div>

<div id="debug-console"><div>[SYSTEM] Debug Mode Active...</div></div>

<script>
// 日誌函數
function addLog(msg, type='info') {
    const con = document.getElementById('debug-console');
    const div = document.createElement('div');
    div.className = type === 'err' ? 'log-err' : (type === 'ok' ? 'log-ok' : '');
    div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    con.appendChild(div);
    con.scrollTop = con.scrollHeight;
}

// 渲染時鐘
setInterval(()=>{
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-TW',{hour12:false});
},1000);

// 通用 Card 產生器
function createCard(id, title) {
    const div = document.createElement('div'); div.className='card';
    div.innerHTML = `<div style="color:var(--muted);font-size:0.75rem">${title}</div><div id="p-${id}" class="price">--</div><div id="m-${id}" class="meta">等待數據...</div>`;
    return div;
}

// 抓取 VIXTW (您的 Worker)
async function fetchVIXTW() {
    addLog("正在請求 /api/vixtw...");
    try {
        const r = await fetch('/api/vixtw');
        addLog(`Worker 回應狀態碼: ${r.status}`);
        const d = await r.json();
        
        if (d.error) {
            addLog(`Worker 回傳錯誤: ${d.error}`, 'err');
            document.getElementById('vix-status').textContent = "數據源無資料";
            return;
        }

        addLog(`VIXTW 抓取成功: ${d.price}`, 'ok');
        document.getElementById('vix-val').textContent = d.price.toFixed(2);
        document.getElementById('vix-status').textContent = d.price > 25 ? "高度恐慌" : "市場穩定";
        document.getElementById('vix-needle').style.left = Math.min(Math.max((d.price-10)/30*100,0),100)+'%';
    } catch (e) {
        addLog(`Fetch 失敗: ${e.message}`, 'err');
        document.getElementById('vix-status').textContent = "API 連線失敗";
    }
}

// 初始化
const assets = [{id:'7769', n:'鴻勁 7769'}, {id:'TAIEX', n:'加權指數'}];
const grid = document.getElementById('tw-grid');
assets.forEach(a => {
    grid.appendChild(createCard(a.id, a.n));
    addLog(`開始抓取 ${a.n}...`);
    fetch(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${a.id}&start_date=${new Date(Date.now()-7*86400000).toISOString().split('T')[0]}`)
    .then(r=>r.json()).then(j=>{
        if(!j.data || j.data.length===0) throw new Error("無資料");
        const cur = j.data[j.data.length-1];
        document.getElementById(`p-${a.id}`).textContent = parseFloat(cur.close).toLocaleString();
        document.getElementById(`m-${a.id}`).textContent = `更新：${cur.date}`;
        addLog(`${a.n} 載入完成`, 'ok');
    }).catch(e=>addLog(`${a.n} 失敗: ${e.message}`, 'err'));
});

fetchVIXTW();
</script>
</body>
</html>
