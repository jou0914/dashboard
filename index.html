<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投資戰情室 v7.9</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --bg: #000; --card: #1c1c1e; --text: #e0e0e0; --gold: #f1c40f; --alert: #ffcc00; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .dashboard { width: 100%; max-width: 380px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card { background: var(--card); padding: 10px; border-radius: 16px; border-left: 4px solid #444; height: 120px; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; }
        .full-width { grid-column: span 2; height: 135px; }
        .card.up { border-left-color: var(--red); }
        .card.down { border-left-color: var(--green); }
        .card.alert-bg { border-left-color: var(--alert); box-shadow: inset 0 0 15px rgba(255, 204, 0, 0.1); }
        .label { font-size: 10px; color: #888; font-weight: 600; }
        .main-val { font-size: 1.3rem; font-weight: 800; line-height: 1.1; margin: 2px 0; }
        .sub-val { font-size: 0.75rem; font-weight: 600; }
        .chart-container { width: 100%; height: 35px; margin-top: auto; }
        .alert-hint { font-size: 8.5px; color: var(--alert); font-weight: bold; }
        .gold-calc { font-size: 0.85rem; color: var(--gold); margin-top: 5px; font-weight: bold; border-top: 1px solid #333; padding-top: 5px; }
        .fng-area { grid-column: span 2; display: flex; flex-direction: column; align-items: center; background: var(--card); border-radius: 16px; padding: 15px; border-left: 4px solid var(--gold); min-height: 170px; }
        .fng-gauge-wrapper { position: relative; width: 200px; height: 100px; }
        #fngValue { font-size: 2.2rem; font-weight: bold; position: absolute; bottom: -5px; width: 100%; text-align: center; }
        .btn-refresh { background: #3367d6; color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; width: 100%; margin-top: 15px; font-size: 16px; grid-column: span 2; }
        #log-window { background: #111; padding: 10px; font-family: monospace; font-size: 9px; color: #00ff00; height: 80px; overflow-y: auto; width: 100%; max-width: 360px; border-radius: 12px; border: 1px solid #333; margin-top: 12px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="card-twii" class="card">
        <div class="label">台股大盤 (^TWII)</div>
        <div id="p-twii" class="main-val">--</div>
        <div id="diff-twii" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-twii"></canvas></div>
    </div>
    <div id="card-wtx" class="card">
        <div id="label-wtx" class="label">台指電子盤</div>
        <div id="p-wtx" class="main-val">--</div>
        <div id="diff-wtx" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-wtx"></canvas></div>
    </div>

    <div id="card-7769" class="card">
        <div class="label">鴻勁 (7769.TW)</div>
        <div id="p-7769" class="main-val">--</div>
        <div id="diff-7769" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-7769"></canvas></div>
    </div>
    <div id="card-oil" class="card">
        <div class="label">布蘭特原油 (Brent)</div>
        <div id="p-oil" class="main-val">--</div>
        <div id="diff-oil" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-oil"></canvas></div>
    </div>

    <div id="card-vix" class="card full-width">
        <div class="label">美股 VIX 指數</div>
        <div id="p-vix" class="main-val">--</div>
        <div id="diff-vix" class="sub-val">--</div>
        <div class="alert-hint">恐慌指標: > 30</div>
        <div class="chart-container"><canvas id="chart-vix"></canvas></div>
    </div>

    <div id="card-twd" class="card">
        <div class="label">USD / TWD</div>
        <div id="p-twd" class="main-val">--</div>
        <div id="diff-twd" class="sub-val">--</div>
    </div>
    <div id="card-jpy" class="card">
        <div class="label">USD / JPY</div>
        <div id="p-jpy" class="main-val">--</div>
        <div class="alert-hint">警戒: > 159</div>
    </div>

    <div id="card-gold" class="card full-width">
        <div class="label">國際黃金 (oz)</div>
        <div id="p-gold" class="main-val">--</div>
        <div id="diff-gold" class="sub-val">--</div>
        <div id="calc-gold" class="gold-calc">換算中...</div>
    </div>

    <div class="fng-area">
        <div id="fngStatus" class="label">CRYPTO FEAR & GREED</div>
        <div class="fng-gauge-wrapper">
            <canvas id="cnnGauge"></canvas>
            <div id="fngValue">--</div>
        </div>
    </div>

    <button class="btn-refresh" onclick="updateAll()">FORCE REFRESH</button>
</div>

<div id="log-window">Initializing v7.9...</div>

<script>
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyNlJGWxjsAK-uX34PxvTT3nFaezansCwcL9a7dvGS9ccOsFW8IviPc59WlVKshS9DzQg/exec';
    let charts = {};

    function addLog(msg) {
        const win = document.getElementById('log-window');
        win.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}\n` + win.innerHTML;
    }

    function renderSparkline(id, historyData, color) {
        const canvas = document.getElementById(`chart-${id}`);
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        if (charts[id]) charts[id].destroy();
        charts[id] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: historyData.map((_, i) => i),
                datasets: [{
                    data: historyData, borderColor: color, borderWidth: 2, pointRadius: 0, fill: true,
                    backgroundColor: (c) => {
                        const g = c.chart.ctx.createLinearGradient(0, 0, 0, 35);
                        g.addColorStop(0, color + '22'); g.addColorStop(1, color + '00'); return g;
                    },
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }

    function updateCard(id, data) {
        if (!data || data.error || !data.chart?.result) { addLog(`⚠️ ${id} 無回傳`); return null; }
        const res = data.chart.result[0];
        const m = res.meta;
        const price = m.regularMarketPrice;
        const prev = m.previousClose;
        const diff = price - prev;
        const perc = (diff / prev) * 100;
        let color = diff >= 0 ? '#ff4d4d' : '#2ecc71';
        
        if (id === 'wtx' && data.isBackup) {
            document.getElementById('label-wtx').innerText = "台指電子盤 (YM)";
            document.getElementById('label-wtx').style.color = "#f1c40f";
        }

        document.getElementById(`p-${id}`).innerText = price.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById(`p-${id}`).style.color = color;
        if(document.getElementById(`diff-${id}`)) {
            document.getElementById(`diff-${id}`).innerText = `${diff >= 0 ? '▲' : '▼'} ${Math.abs(diff).toFixed(2)} (${perc.toFixed(2)}%)`;
            document.getElementById(`diff-${id}`).style.color = color;
        }

        const card = document.getElementById(`card-${id}`);
        if(card) card.className = `${id==='gold'||id==='vix'?'card full-width':'card'} ${diff>=0?'up':'down'} ${id==='jpy'&&price>159?'alert-bg':''}`;

        try {
            const h = res.indicators.quote[0].close.filter(v => v !== null);
            if (h.length > 0) renderSparkline(id, h, color);
        } catch(e) {}
        return price;
    }

    async function updateAll() {
        addLog('Syncing...');
        try {
            const res = await fetch(PROXY_URL);
            const data = await res.json();
            updateCard('twii', data.stock_twii);
            updateCard('7769', data.stock_7769);
            updateCard('wtx', data.stock_wtx);
            updateCard('vix', data.vix_index);
            updateCard('oil', data.oil_brent);
            updateCard('jpy', data.usd_jpy);
            const twd = updateCard('twd', data.usd_twd);
            const goldOz = updateCard('gold', data.gold_price);
            
            if (twd && goldOz) {
                document.getElementById('calc-gold').innerText = `換算：${Math.round((goldOz * twd) / 31.1035).toLocaleString()} NT$/g`;
            }
            if (data.crypto_fng?.data) {
                const val = parseInt(data.crypto_fng.data[0].value);
                document.getElementById('fngValue').innerText = val;
                drawGauge(val);
                addLog('✅ Dashboard Updated');
            }
        } catch (e) { addLog('❌ Sync Failed'); }
    }

    function drawGauge(value) {
        const canvas = document.getElementById('cnnGauge');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 200; ctx.scale(2, 2);
        ctx.clearRect(0, 0, 200, 100);
        ctx.beginPath(); ctx.arc(100, 95, 80, Math.PI, 0); ctx.lineWidth = 12; ctx.strokeStyle = '#333'; ctx.stroke();
        const grad = ctx.createLinearGradient(40, 0, 160, 0);
        grad.addColorStop(0, '#ff4d4d'); grad.addColorStop(0.5, '#f1c40f'); grad.addColorStop(1, '#2ecc71');
        ctx.beginPath(); ctx.arc(100, 95, 80, Math.PI, Math.PI + (Math.PI * (value / 100))); ctx.strokeStyle = grad; ctx.stroke();
    }
    updateAll();
    setInterval(updateAll, 300000);
</script>
</body>
</html>
