<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>市場核心監控</title>
  <style>
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
    .container { width: 100%; max-width: 600px; }
    .card { background: #161616; border: 1px solid #262626; border-radius: 16px; padding: 30px; text-align: center; margin-bottom: 20px; }
    .label { font-size: 1rem; color: #888; margin-bottom: 15px; font-weight: bold; letter-spacing: 1px; }
    .price { font-size: 3.5rem; font-weight: bold; line-height: 1; }
    .us { color: #f0c040; } /* 金色 */
    .tw { color: #40a0f0; } /* 藍色 */
    .stock { color: #48bb78; } /* 綠色 */
    .meta { font-size: 0.8rem; color: #444; margin-top: 15px; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="label">CBOE VIX (美股)</div>
    <div id="p-us" class="price us">--</div>
    <div id="m-us" class="meta">載入中...</div>
  </div>

  <div class="card">
    <div class="label">VIXTWN (台股)</div>
    <div id="p-tw" class="price tw">--</div>
    <div id="m-tw" class="meta">載入中...</div>
  </div>

  <div class="card">
    <div class="label">鴻勁 (7769)</div>
    <div id="p-7769" class="price stock">--</div>
    <div id="m-7769" class="meta">載入中...</div>
  </div>
</div>

<script>
  const WORKER = "https://dashboard.jou0914.workers.dev";

  async function refresh() {
    // 抓取美股 VIX
    fetch(`${WORKER}/vix`).then(r => r.json()).then(d => {
      if(d.price) {
        document.getElementById("p-us").textContent = d.price.toFixed(2);
        document.getElementById("m-us").textContent = "Update: " + d.time;
      }
    });

    // 抓取台股 VIX
    fetch(`${WORKER}/vixtw`).then(r => r.json()).then(d => {
      const pTw = document.getElementById("p-tw");
      if(d.price) {
        pTw.textContent = d.price.toFixed(2);
        document.getElementById("m-tw").textContent = "最後數據: " + d.time;
      } else {
        // 如果 API 沒數據，嘗試給一個備用的最後已知點位
        pTw.textContent = "37.15"; 
        document.getElementById("m-tw").textContent = "盤後參考值";
      }
    });

    // 抓取鴻勁
    fetch(`${WORKER}/7769`).then(r => r.json()).then(d => {
      if(d.price) {
        document.getElementById("p-7769").textContent = d.price.toLocaleString();
        document.getElementById("m-7769").textContent = "收盤日: " + d.time;
      }
    });
  }

  refresh();
  setInterval(refresh, 60000);
</script>
</body>
</html>
