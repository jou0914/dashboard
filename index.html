<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日財經儀表板 Pro v5</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0a0c10;
  --card:#111318;
  --text:#e8eaf0;
  --muted:#6b7280;
  --gold:#f5c842;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans TC',sans-serif;
  padding:15px;
}

.container{max-width:1200px;margin:auto}

.header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;
}

.title{color:var(--gold);font-weight:700}

.clock{
  font-size:12px;
  background:var(--card);
  padding:6px 10px;
  border-radius:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:12px;
}

.card{
  background:var(--card);
  border-radius:12px;
  height:200px;
  overflow:hidden;
}

iframe{width:100%;height:100%;border:none}

.section{
  margin-top:25px;
  font-size:12px;
  color:var(--muted);
}

.tip{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  font-size:13px;
  line-height:1.6;
}
</style>
</head>

<body>
<div class="container">

<div class="header">
  <div class="title">MY DAILY BRIEF v5</div>
  <div class="clock" id="clock"></div>
</div>

<div class="section">🚀 台股核心</div>
<div class="grid">

<div class="card">
<iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=TPE%3A7769&locale=zh_TW&theme=dark"></iframe>
</div>

<div class="card">
<iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=TWSE%3ATAIEX&locale=zh_TW&theme=dark"></iframe>
</div>

<div class="card">
<iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=TPE%3A00679B&locale=zh_TW&theme=dark"></iframe>
</div>

</div>

<div class="section">🌐 全球市場</div>
<div class="grid">

<div class="card">
<iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=FX_IDC%3AUSDTWD&theme=dark"></iframe>
</div>

<div class="card">
<iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=OANDA%3AXAUUSD&theme=dark"></iframe>
</div>

<div class="card">
<iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=NASDAQ%3ATLT&theme=dark"></iframe>
</div>

</div>

<div class="section">📊 籌碼 / 數據（外部）</div>
<div class="grid">

<div class="card">
<iframe src="https://goodinfo.tw/tw/StockDetail.asp?STOCK_ID=7769"></iframe>
</div>

<div class="card">
<iframe src="https://www.twse.com.tw/zh/trading/fund/BFI82U"></iframe>
</div>

<div class="card">
<iframe src="https://www.twse.com.tw/zh/trading/margin/TWT72U"></iframe>
</div>

</div>

<div class="section">💡 投資備忘</div>
<div class="grid">
<div class="tip">
• 留意台積電/設備股訂單循環
• 美債殖利率趨勢影響股市
• 黃金 = 避險資產觀察
</div>

<div class="tip">
• 外資買賣超方向
• 融資增減（散戶情緒）
• 借券賣出（放空力道）
</div>
</div>

</div>

<script>
function updateClock(){
  const now=new Date();
  document.getElementById('clock').innerText=
    now.toLocaleTimeString('zh-TW',{hour12:false});
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
