<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高級市場儀表板 v1.4.2</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: rgba(22, 27, 34, 0.8);
    --border: #30363d;
    --accent: #f2c94c; 
    --accent2: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --text: #c9d1d9;
    --text-muted: #8b949e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    padding-bottom: 40px;
  }
  header {
    background: rgba(13, 17, 23, 0.9);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0; z-index: 100;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px; padding: 16px;
  }
  .section-title {
    padding: 20px 16px 8px;
    font-size: 11px;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 900;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: 0.2s;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--text-muted); }
  .card-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .card-value { font-family: 'Share Tech Mono', monospace; font-size: 24px; font-weight: bold; }
  .card-sub { font-family: 'Share Tech Mono', monospace; font-size: 12px; margin-top: 4px; }
  .up { color: var(--green) !important; }
  .down { color: var(--red) !important; }
  .sparkline-wrap { height: 50px; margin-top: 10px; }
  .btn {
    padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--accent); color: #000; font-weight: bold; cursor: pointer;
  }
  .warn-badge {
    display: inline-block; padding: 2px 6px; border-radius: 4px;
    background: rgba(248, 81, 73, 0.1); color: var(--red); font-size: 10px; margin-top: 5px;
  }
</style>
</head>
<body>

<header>
  <h1 style="font-size:16px; color:var(--accent)">📊 MARKET MONITOR</h1>
  <div style="display:flex; gap:10px; align-items:center">
    <span id="last-update" style="font-size:11px; font-family:'Share Tech Mono'">--</span>
    <button class="btn" onclick="fetchAll()">REFRESH</button>
  </div>
</header>

<div class="section-title">🇹🇼 台灣市場</div>
<div class="grid">
  <div class="card" id="card-twii">
    <div class="card-label">台股大盤 TWII</div>
    <div class="card-value" id="twii-val">...</div>
    <div class="card-sub" id="twii-chg">--</div>
    <div class="sparkline-wrap"><canvas id="spark-twii"></canvas></div>
  </div>
  <div class="card" id="card-7769">
    <div class="card-label">7769 鴻勁精密</div>
    <div class="card-value" id="s7769-val">...</div>
    <div class="card-sub" id="s7769-chg">--</div>
    <div class="sparkline-wrap"><canvas id="spark-7769"></canvas></div>
  </div>
</div>

<div class="section-title">🌎 全球商品與匯率</div>
<div class="grid">
  <div class="card">
    <div class="card-label">USD / TWD 台幣</div>
    <div id="twd-val" class="card-value">...</div>
    <div id="twd-chg" class="card-sub">--</div>
    <div class="sparkline-wrap"><canvas id="spark-twd"></canvas></div>
  </div>
  <div class="card">
    <div class="card-label">黃金 (USD/oz)</div>
    <div id="gold-val" class="card-value">...</div>
    <div id="gold-chg" class="card-sub">--</div>
    <div class="sparkline-wrap"><canvas id="spark-gold"></canvas></div>
  </div>
</div>

<script>
const GAS_URL = '你的_GAS_部署網址'; [span_36](start_span)// 請替換成你的 GAS URL[span_36](end_span)

async function fetchAll() {
  document.getElementById('last-update').textContent = 'UPDATING...';
  try {
    const r = await fetch(GAS_URL); [span_37](start_span)[span_38](start_span)//[span_37](end_span)[span_38](end_span)
    const data = await r.json();
    
    // 更新數值與迷你圖 (以台股為例)
    updateCard('twii', data.twii, data.twii_chg, data.twii_pct, data.twii_history); [span_39](start_span)[span_40](start_span)//[span_39](end_span)[span_40](end_span)
    updateCard('s7769', data.s7769, data.s7769_chg, data.s7769_pct, data.s7769_history); [span_41](start_span)[span_42](start_span)//[span_41](end_span)[span_42](end_span)
    updateCard('twd', data.twd, data.twd_chg, data.twd_pct, data.twd_history, 3); [span_43](start_span)[span_44](start_span)//[span_43](end_span)[span_44](end_span)
    updateCard('gold', data.gold, data.gold_chg, data.gold_pct, data.gold_history); [span_45](start_span)[span_46](start_span)//[span_45](end_span)[span_46](end_span)

    document.getElementById('last-update').textContent = new Date().toLocaleTimeString(); [span_47](start_span)//[span_47](end_span)
  } catch (e) { console.error(e); }
}

function updateCard(id, val, chg, pct, history, dec = 2) {
  const vEl = document.getElementById(id + '-val');
  const cEl = document.getElementById(id + '-chg');
  if (vEl && val) vEl.textContent = Number(val).toLocaleString(undefined, {minimumFractionDigits: dec}); [span_48](start_span)//[span_48](end_span)
  if (cEl && chg !== undefined) {
    const sign = chg >= 0 ? '+' : '';
    cEl.textContent = `${sign}${chg.toFixed(2)} (${sign}${pct.toFixed(2)}%)`; [span_49](start_span)//[span_49](end_span)
    cEl.className = 'card-sub ' + (chg >= 0 ? 'up' : 'down'); [span_50](start_span)//[span_50](end_span)
  }
  if (history) renderSparkline('spark-' + id, history, chg >= 0 ? '#3fb950' : '#f85149'); [span_51](start_span)[span_52](start_span)//[span_51](end_span)[span_52](end_span)
}

function renderSparkline(canvasId, dataArr, color) {
  const ctx = document.getElementById(canvasId).getContext('2d'); [span_53](start_span)//[span_53](end_span)
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: dataArr.map((_, i) => i),
      datasets: [{ data: dataArr, borderColor: color, borderWidth: 2, pointRadius: 0, fill: false, tension: 0.4 }]
    },
    [span_54](start_span)options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } } //[span_54](end_span)
  });
}

fetchAll();
setInterval(fetchAll, 60000); [span_55](start_span)// 每分鐘自動更新一次[span_55](end_span)
</script>
</body>
</html>
