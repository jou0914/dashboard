<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投資戰情室 v7.5</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --bg: #000; --card: #1c1c1e; --text: #e0e0e0; --gold: #f1c40f; --alert: #ffcc00; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .dashboard { width: 100%; max-width: 380px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .card { background: var(--card); padding: 10px; border-radius: 16px; border-left: 4px solid #444; height: 125px; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; position: relative; }
        .full-width { grid-column: span 2; height: 145px; }
        .card.up { border-left-color: var(--red); }
        .card.down { border-left-color: var(--green); }
        .card.alert-bg { border-left-color: var(--alert); box-shadow: inset 0 0 10px rgba(255, 204, 0, 0.2); }
        
        .label { font-size: 10px; color: #888; font-weight: 600; margin-bottom: 2px; }
        .main-val { font-size: 1.35rem; font-weight: 800; line-height: 1.1; }
        .sub-val { font-size: 0.75rem; font-weight: 600; margin-top: 2px; }
        .chart-container { width: 100%; height: 35px; margin-top: auto; position: relative; }
        
        .alert-hint { font-size: 8.5px; color: var(--alert); font-weight: bold; margin-top: 2px; }
        .gold-calc { font-size: 0.85rem; color: var(--gold); margin-top: 5px; font-weight: bold; border-top: 1px solid #333; padding-top: 5px; }
        
        .flex-row { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .fng-area { grid-column: span 2; display: flex; flex-direction: column; align-items: center; background: var(--card); border-radius: 16px; padding: 12px; border-left: 4px solid var(--gold); position: relative; min-height: 175px; }
        .fng-gauge-wrapper { position: relative; width: 220px; height: 110px; margin: 5px 0; overflow: hidden; }
        #cnnGauge { width: 220px !important; height: 110px !important; }
        #fngValue { font-size: 2.2rem; font-weight: bold; position: absolute; bottom: 0px; width: 100%; text-align: center; left: 0; }
        #fngStatus { font-size: 10px; color: var(--gold); font-weight: bold; margin-bottom: 2px; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; margin-top: 10px; }
        .btn-link { color: white; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 48px; border-radius: 10px; font-size: 11px; font-weight: bold; text-align: center; }
        .btn-cnn { background: #cc0000; }
        .btn-vixtwn { background: #444; border: 1px solid #666; }
        .btn-sub { font-size: 8px; color: var(--alert); font-weight: normal; margin-top: 2px; }

        .btn-refresh { background: #3367d6; color: white; border: none; padding: 15px; border-radius: 14px; font-weight: bold; width: 100%; margin-top: 10px; font-size: 16px; cursor: pointer; grid-column: span 2; }
        #log-window { background: #111; padding: 8px; font-family: monospace; font-size: 9px; color: #00ff00; height: 70px; overflow-y: auto; width: 100%; max-width: 360px; border-radius: 10px; border: 1px solid #333; margin-top: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="card-twii" class="card">
        <div class="label">台股大盤 (^TWII)</div>
        <div id="p-twii" class="main-val">--</div>
        <div id="diff-twii" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-twii"></canvas></div>
    </div>
    <div id="card-wtx" class="card">
        <div class="label">台指期貨</div>
        <div id="p-wtx" class="main-val">--</div>
        <div id="diff-wtx" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-wtx"></canvas></div>
    </div>

    <div id="card-7769" class="card">
        <div class="label">鴻勁 (7769.TW)</div>
        <div id="p-7769" class="main-val">--</div>
        <div id="diff-7769" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-7769"></canvas></div>
    </div>
    <div id="card-oil" class="card">
        <div class="label">布蘭特原油 (Brent)</div>
        <div id="p-oil" class="main-val">--</div>
        <div id="diff-oil" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-oil"></canvas></div>
    </div>

    <div id="card-vix" class="card full-width" style="height: 110px;">
        <div class="label">美股 VIX 指數</div>
        <div id="p-vix" class="main-val">--</div>
        <div id="diff-vix" class="sub-val">--</div>
        <div class="alert-hint">指標: > 30</div>
        <div class="chart-container" style="height: 30px;"><canvas id="chart-vix"></canvas></div>
    </div>

    <div class="flex-row">
        <div id="card-twd" class="card">
            <div class="label">USD / TWD</div>
            <div id="p-twd" class="main-val">--</div>
            <div id="diff-twd" class="sub-val">--</div>
            <div class="chart-container"><canvas id="chart-twd"></canvas></div>
        </div>
        <div id="card-jpy" class="card">
            <div class="label">USD / JPY</div>
            <div id="p-jpy" class="main-val">--</div>
            <div id="diff-jpy" class="sub-val">--</div>
            <div class="alert-hint">指標: > 159</div>
            <div class="chart-container"><canvas id="chart-jpy"></canvas></div>
        </div>
    </div>

    <div id="card-gold" class="card full-width">
        <div class="label">國際黃金 (oz)</div>
        <div id="p-gold" class="main-val">--</div>
        <div id="diff-gold" class="sub-val">--</div>
        <div class="chart-container"><canvas id="chart-gold"></canvas></div>
        <div id="calc-gold" class="gold-calc">換算中...</div>
    </div>

    <div class="fng-area">
        <div class="label">CRYPTO FEAR & GREED</div>
        <div id="fngStatus">--</div>
        <div class="fng-gauge-wrapper">
            <canvas id="cnnGauge"></canvas>
            <div id="fngValue">--</div>
        </div>
        <div class="alert-hint">指標: < 10</div>
        <div class="btn-row">
            <a href="https://www.cnn.com/markets/fear-and-greed" target="_blank" class="btn-link btn-cnn">
                CNN 恐慌按鈕
                <span class="btn-sub">指標: < 10</span>
            </a>
            <a href="https://www.wantgoo.com/index/vixtwn" target="_blank" class="btn-link btn-vixtwn">
                台股 VIX 網頁
                <span class="btn-sub">指標: > 40</span>
            </a>
        </div>
    </div>

    <button class="btn-refresh" onclick="updateAll()">FORCE REFRESH</button>
</div>

<div style="width:100%; max-width:360px; display:flex; justify-content:space-between; margin-top:10px;">
    <span style="font-size:10px; color:#888;">DEBUG CONSOLE</span>
    <button onclick="copyLog()" style="background:#444; color:#ccc; border:none; padding:2px 8px; border-radius:4px; font-size:10px;">COPY</button>
</div>
<div id="log-window">Ready...</div>

<script>
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyNlJGWxjsAK-uX34PxvTT3nFaezansCwcL9a7dvGS9ccOsFW8IviPc59WlVKshS9DzQg/exec';
    let charts = {};

    function addLog(msg) {
        const win = document.getElementById('log-window');
        win.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}\n` + win.innerHTML;
    }

    function copyLog() {
        navigator.clipboard.writeText(document.getElementById('log-window').innerText).then(() => alert('Log 已複製'));
    }

    function renderSparkline(id, historyData, color) {
        const canvas = document.getElementById(`chart-${id}`);
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        if (charts[id]) charts[id].destroy();
        charts[id] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: historyData.map((_, i) => i),
                datasets: [{
                    data: historyData, borderColor: color, borderWidth: 2, pointRadius: 0, fill: true,
                    backgroundColor: (c) => {
                        const g = c.chart.ctx.createLinearGradient(0, 0, 0, 35);
                        g.addColorStop(0, color + '33'); g.addColorStop(1, color + '00'); return g;
                    },
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }

    function updateCard(id, data) {
        if (!data || data.error || !data.chart?.result) { addLog(`⚠️ ${id} 抓取略過`); return null; }
        const res = data.chart.result[0];
        const m = res.meta;
        const price = m.regularMarketPrice;
        const diff = price - m.previousClose;
        const perc = (diff / m.previousClose) * 100;
        let color = diff >= 0 ? '#ff4d4d' : '#2ecc71';
        
        // 日幣警戒顏色邏輯
        if(id === 'jpy' && price > 159) color = '#ffcc00';

        document.getElementById(`p-${id}`).innerText = price.toLocaleString(undefined, {minimumFractionDigits: (id.includes('twd')||id.includes('jpy')?2:0)});
        document.getElementById(`p-${id}`).style.color = color;
        document.getElementById(`diff-${id}`).innerText = `${diff >= 0 ? '▲' : '▼'} ${Math.abs(diff).toFixed(2)} (${perc.toFixed(2)}%)`;
        document.getElementById(`diff-${id}`).style.color = color;

        const card = document.getElementById(`card-${id}`);
        if(card) {
            let base = (id==='gold'||id==='vix') ? 'card full-width' : 'card';
            card.className = `${base} ${diff >= 0 ? 'up' : 'down'} ${id === 'jpy' && price > 159 ? 'alert-bg' : ''}`;
        }

        try {
            const h = res.indicators.quote[0].close.filter(v => v !== null);
            if (h.length > 0) renderSparkline(id, h, color);
        } catch(e) {}
        return price;
    }

    async function updateAll() {
        addLog('Connecting to GAS...');
        try {
            const res = await fetch(PROXY_URL);
            const data = await res.json();
            updateCard('twii', data.stock_twii);
            updateCard('7769', data.stock_7769);
            updateCard('wtx', data.stock_wtx);
            updateCard('vix', data.vix_index);
            updateCard('oil', data.oil_brent);
            updateCard('jpy', data.usd_jpy);
            const twd = updateCard('twd', data.usd_twd);
            const goldOz = updateCard('gold', data.gold_price);
            
            if (twd && goldOz) {
                document.getElementById('calc-gold').innerText = `換算：${Math.round((goldOz * twd) / 31.1035).toLocaleString()} NT$/g`;
            }
            if (data.crypto_fng?.data) {
                const val = parseInt(data.crypto_fng.data[0].value);
                document.getElementById('fngValue').innerText = val;
                document.getElementById('fngStatus').innerText = data.crypto_fng.data[0].value_classification.toUpperCase();
                drawGauge(val);
                addLog('✅ Sync Success');
            }
        } catch (e) { addLog('❌ Sync Failed: ' + e.message); }
    }

    function drawGauge(value) {
        const canvas = document.getElementById('cnnGauge');
        const ctx = canvas.getContext('2d');
        canvas.width = 440; canvas.height = 220; ctx.scale(2, 2);
        ctx.clearRect(0, 0, 220, 110);
        ctx.beginPath(); ctx.arc(110, 100, 85, Math.PI, 0); ctx.lineWidth = 14; ctx.strokeStyle = '#333'; ctx.stroke();
        const grad = ctx.createLinearGradient(30, 0, 190, 0);
        grad.addColorStop(0, '#ff4d4d'); grad.addColorStop(0.5, '#f1c40f'); grad.addColorStop(1, '#2ecc71');
        ctx.beginPath(); ctx.arc(110, 100, 85, Math.PI, Math.PI + (Math.PI * (value / 100))); ctx.strokeStyle = grad; ctx.stroke();
    }
    updateAll();
</script>
</body>
</html>
