<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市場核心監控 v1.8.0</title>
    <style>
        :root { --up: #48bb78; --down: #ff4d4d; --bg: #000; --card: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .ver { width: 100%; text-align: right; font-size: 10px; color: #222; margin-bottom: 8px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--card); border: 1px solid #151515; border-radius: 16px; padding: 20px; text-align: left; position: relative; overflow: hidden; }
        .full { grid-column: span 2; }
        
        .label { font-size: 10px; color: #555; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }
        .price { font-size: 2.4rem; font-weight: 900; line-height: 1; letter-spacing: -1px; }
        .change { font-size: 0.9rem; font-weight: bold; margin-top: 8px; display: flex; align-items: center; }
        .change::before { content: ''; display: inline-block; width: 0; height: 0; margin-right: 5px; }
        .up { color: var(--up); } .up::before { border-left: 5px solid transparent; border-right: 5px solid transparent; border-bottom: 8px solid var(--up); }
        .down { color: var(--down); } .down::before { border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 8px solid var(--down); }

        /* CNN Gauge */
        .cnn-val { font-size: 3rem; font-weight: 900; color: #ff4d4d; }
        .cnn-label { font-size: 12px; color: #444; margin-top: -5px; }

        #debug-panel { margin-top: 20px; font-size: 9px; color: #1a1a1a; width: 100%; }
    </style>
</head>
<body>
<div class="container">
    <div class="ver">TERMINAL v1.8.0</div>
    <div class="grid">
        <div class="card full" style="border-left: 4px solid #ff4d4d;">
            <div class="label">Sentiment / CNN Fear & Greed</div>
            <div id="p-cnn" class="cnn-val">--</div>
            <div id="m-cnn" class="cnn-label">LOADING...</div>
        </div>
        
        <div class="card">
            <div class="label">VIX Index (US)</div>
            <div id="p-vix" class="price" style="color: #f0c040;">--</div>
            <div id="c-vix" class="change">--</div>
        </div>

        <div class="card">
            <div class="label">VIX Index (TW)</div>
            <div id="p-vtw" class="price" style="color: #40a0f0;">--</div>
            <div id="c-vtw" class="change">--</div>
        </div>

        <div class="card full">
            <div class="label">Forex / USD to TWD</div>
            <div id="p-twd" class="price" style="color: #a084ff;">--</div>
            <div id="c-twd" class="change">--</div>
        </div>

        <div class="card full">
            <div class="label">Equity / 7769.TW 鴻勁</div>
            <div id="p-7769" class="price" style="color: #48bb78;">--</div>
            <div id="c-7769" class="change">--</div>
        </div>
    </div>
    <div id="debug-panel"><div id="log-content"></div></div>
</div>

<script>
    const API = "https://dashboard.jou0914.workers.dev";
    
    async function refresh() {
        const fetchItem = async (path, id, fix = 2) => {
            try {
                const res = await fetch(`${API}${path}`);
                const d = await res.json();
                
                if (path === "/cnn") {
                    document.getElementById("p-cnn").textContent = d.price;
                    document.getElementById("m-cnn").textContent = d.label;
                    return;
                }

                const pEl = document.getElementById(`p-${id}`);
                const cEl = document.getElementById(`c-${id}`);

                if (d.price) {
                    pEl.textContent = (id === '7769') ? d.price.toLocaleString() : d.price.toFixed(fix);
                    const sign = d.isUp ? '+' : '';
                    cEl.textContent = `${sign}${d.change.toFixed(2)}%`;
                    cEl.className = `change ${d.isUp ? 'up' : 'down'}`;
                }
            } catch (e) { console.error(e); }
        };

        await fetchItem('/cnn', 'cnn');
        await fetchItem('/vix', 'vix');
        await fetchItem('/vixtw', 'vtw');
        await fetchItem('/twd', 'twd', 3);
        await fetchItem('/7769', '7769');
    }

    refresh();
    setInterval(refresh, 60000);
</script>
</body>
</html>
