<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7769 鴻勁 - AI 綜合分析 v4.3.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --buy-red: #d20000; --sell-green: #008000; --bg: #f0f2f5; 
            --card-bg: #ffffff; --border: #e1e4e8; --text-main: #1a1a1a;
            --text-sub: #666666; --accent: #007bff; --sbl-blue: #0056b3; --ai-purple: #8e44ad; --foreign-gold: #b8860b; --tlt-navy: #002366;
        }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 15px; margin: 0; color: var(--text-main); }
        .container { max-width: 1000px; margin: auto; background: var(--card-bg); padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: relative; }
        
        .version-tag { font-size: 10px; color: #bbb; vertical-align: middle; margin-left: 5px; }

        .dash-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; background: #f8f9fa; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
        .price-main { grid-column: span 2; display: flex; flex-direction: column; justify-content: center; }
        .current-price { font-size: 38px; font-weight: 800; line-height: 1; outline: none; }
        .price-diff { font-size: 16px; font-weight: 600; margin-top: 5px; outline: none; }
        .dash-item { display: flex; flex-direction: column; justify-content: center; border-left: 1px solid #ddd; padding-left: 15px; }
        .dash-label { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }
        .dash-val { font-size: 15px; font-weight: 600; color: #333; outline: none; }

        /* TLT 專用樣式 */
        .tlt-section { border-left: 4px solid var(--tlt-navy) !important; background: #f0f2f8; }
        .tlt-label { color: var(--tlt-navy); font-weight: bold; }

        .sbl-section { border-left: 4px solid var(--sbl-blue) !important; background: #f0f7ff; }
        .foreign-section { border-left: 4px solid var(--foreign-gold) !important; background: #fffdf0; }
        .highlight-gold { color: var(--foreign-gold); font-size: 18px; }

        .action-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; text-decoration: none; }
        .btn-link { background: #2c3e50; color: white; }
        .btn-fetch { background: #28a745; color: white; }
        .btn-ai { background: var(--ai-purple); color: white; }
        .btn-upload { background: #007bff; color: white; position: relative; }
        .btn-screenshot { background: #6f42c1; color: white; }
        .btn-copy { background: #fd7e14; color: white; }
        
        .btn:hover { opacity: 0.8; }
        input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .ai-section { margin-top: 15px; padding: 20px; background: #f9f0ff; border-radius: 12px; border: 1px solid #dcd0ff; display: none; }
        .ai-title { color: var(--ai-purple); font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .ai-content { font-size: 14px; line-height: 1.6; color: #4a4a4a; white-space: pre-wrap; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; background: white; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #f1f3f5; color: #555; font-weight: 600; }
        .up { color: var(--buy-red); font-weight: bold; }
        .down { color: var(--sell-green); font-weight: bold; }

        .summary { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; font-weight: bold; border: 1px solid #eee; }

        .report-area { margin-top: 25px; padding: 15px; background: #f1f3f5; border-radius: 10px; border: 1px dashed #ccc; }
        textarea { width: 100%; height: 250px; border: none; background: transparent; font-family: monospace; font-size: 12px; color: #333; resize: none; outline: none; }

        .debug-panel { margin-top: 20px; padding: 15px; background: #1a1a1a; color: #00ff00; font-family: monospace; font-size: 11px; border-radius: 8px; overflow-y: auto; max-height: 150px; border: 1px solid #444; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        #previewImg { max-width: 100%; max-height: 80%; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .close-btn { margin-top: 20px; background: white; color: black; padding: 10px 40px; border-radius: 25px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .price-main { grid-column: span 1; } .dash-item { border-left: none; padding-left: 0; } }
    </style>
</head>
<body>

<div class="container" id="captureArea">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <div>
            <h2 style="margin:0; font-size: 24px; color: #333;">7769 鴻勁 <span class="version-tag">v4.3.0 AI</span></h2>
            <div style="font-size: 13px; color: var(--text-sub);">上市半導體 | 綜合數據分析終端</div>
        </div>
        <div style="text-align: right;">
            <div id="trade-date" style="font-size: 13px; color: var(--text-sub); font-weight: bold;">同步中...</div>
            <div id="sync-status" style="font-size: 10px; color: #aaa;">來源偵測中</div>
        </div>
    </div>

    <!-- 行情儀表板 -->
    <div id="price-dashboard" class="dash-section">
        <div class="price-main">
            <div id="cur-price" class="current-price">----</div>
            <div id="cur-diff" class="price-diff">-- ( --% )</div>
        </div>
        <div class="dash-item"><span class="dash-label">開盤</span><span id="p-open" class="dash-val">--</span></div>
        <div class="dash-item"><span class="dash-label">最高</span><span id="p-high" class="dash-val">--</span></div>
        <div class="dash-item"><span class="dash-label">最低</span><span id="p-low" class="dash-val">--</span></div>
        <div class="dash-item"><span class="dash-label">成交量</span><span id="p-vol" class="dash-val">--</span></div>
    </div>

    <!-- 全球宏觀指標 (TLT) -->
    <div id="tlt-dashboard" class="dash-section tlt-section">
        <div class="dash-item" style="border-left:none; padding-left:0;"><span class="dash-label tlt-label">TLT 美債 20Y ETF</span><span id="tlt-price" class="dash-val">—</span></div>
        <div class="dash-item"><span class="dash-label">TLT 漲跌</span><span id="tlt-diff" class="dash-val">—</span></div>
        <div class="dash-item"><span class="dash-label">TLT 幅度</span><span id="tlt-percent" class="dash-val">—</span></div>
    </div>

    <!-- 外資持股儀表板 -->
    <div id="foreign-dashboard" class="dash-section foreign-section">
        <div class="dash-item" style="border-left:none; padding-left:0;"><span class="dash-label">外資持股比例</span><span id="f-ratio" class="dash-val highlight-gold">—</span></div>
        <div class="dash-item"><span class="dash-label">持有股數</span><span id="f-shares" class="dash-val">—</span></div>
        <div class="dash-item"><span class="dash-label">發行總股數</span><span id="f-issued" class="dash-val">—</span></div>
        <div class="dash-item"><span class="dash-label">外資資料日期</span><span id="f-date" class="dash-val">—</span></div>
    </div>

    <!-- 借券資訊儀表板 -->
    <div id="sbl-dashboard" class="dash-section sbl-section">
        <div class="dash-item" style="border-left:none; padding-left:0;"><span class="dash-label">當日借券餘額</span><span id="sbl-bal" class="dash-val">—</span></div>
        <div class="dash-item"><span class="dash-label">今日賣出</span><span id="sbl-sell" class="dash-val">—</span></div>
        <div class="dash-item"><span class="dash-label">今日還券</span><span id="sbl-ret" class="dash-val">—</span></div>
        <div class="dash-item"><span class="dash-label">借券資料日期</span><span id="sbl-date" class="dash-val">—</span></div>
    </div>
    
    <div class="action-bar" data-html2canvas-ignore>
        <a href="https://bsr.twse.com.tw/bshtm/" target="_blank" class="btn btn-link">🔗 開啟證交所</a>
        <button onclick="fetchAllData()" class="btn btn-fetch">🔄 同步最新數據</button>
        <button onclick="askGemini()" class="btn btn-ai" id="aiBtn">🤖 AI 分析</button>
        <div class="btn btn-upload">📁 上傳分點 CSV<input type="file" id="csvFile" accept=".csv"></div>
        <button onclick="generatePreview()" id="shotBtn" class="btn btn-screenshot">📸 截圖</button>
        <button onclick="copyAllLog()" class="btn btn-copy">📋 複製報告</button>
    </div>

    <div id="aiSection" class="ai-section">
        <div class="ai-title">✨ Gemini 專業金融分析</div>
        <div id="aiContent" class="ai-content">正在思考中...</div>
    </div>

    <div id="summary-info" class="summary" style="display:none;">
        <span style="color:var(--buy-red)">總買進：<span id="total-buy">0</span> 張</span>
        <span style="color:var(--sell-green)">總賣出：<span id="total-sell">0</span> 張</span>
    </div>

    <div id="result" class="grid" style="display:none;">
        <div>
            <table>
                <thead><tr><th colspan="3" style="background:#fff1f0; color:var(--buy-red)">買超前十名 (張)</th></tr></thead>
                <tbody id="buy-body"></tbody>
            </table>
        </div>
        <div>
            <table>
                <thead><tr><th colspan="3" style="background:#f6ffed; color:var(--sell-green)">賣超前十名 (張)</th></tr></thead>
                <tbody id="sell-body"></tbody>
            </table>
        </div>
    </div>

    <div class="report-area" id="reportContainer" data-html2canvas-ignore>
        <textarea id="textReport" readonly></textarea>
    </div>

    <div class="debug-panel" id="debugPanel" data-html2canvas-ignore>
        <div id="debugContent">系統日誌啟動...</div>
    </div>
</div>

<div id="overlay">
    <div style="color:white; margin-bottom:15px; font-weight: bold; text-align: center;">截圖已產生！<br>請長按圖片「拷貝」或「儲存」</div>
    <img id="previewImg" src="" alt="截圖預覽">
    <div class="close-btn" onclick="document.getElementById('overlay').style.display='none'">關閉預覽</div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyxn5J6wIVLxRHuWbAigreCh7f9lOliJAgGFPkOqKj3-elZyS0xVahYDQvxcQuSXrXS/exec';
    let currentBuyList = [];
    let currentSellList = [];
    let globalData = {};
    let finmindForeign = null;
    let finmindSBL = null;

    function log(msg) {
        const d = document.getElementById('debugContent');
        d.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${msg}`;
        d.scrollTop = d.scrollHeight;
    }

    async function fetchAllData() {
        const btn = document.querySelector('.btn-fetch');
        btn.innerText = "同步中...";
        log("連線 GAS 與 FinMind...");
        await Promise.all([fetchYahooPrice(), fetchForeignData(), fetchShortSaleData()]);
        btn.innerText = "同步完成";
        updateTextReport();
        setTimeout(() => { btn.innerText = "🔄 同步最新數據"; }, 2000);
    }

    async function fetchYahooPrice() {
        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            globalData = data;
            if (data.price) {
                const p = data.price;
                document.getElementById('trade-date').innerText = "日期：" + p.date;
                document.getElementById('cur-price').innerText = p.close;
                document.getElementById('p-open').innerText = p.open;
                document.getElementById('p-high').innerText = p.high;
                document.getElementById('p-low').innerText = p.low;
                document.getElementById('p-vol').innerText = p.vol + " 張";
                const color = parseFloat(p.diff) > 0 ? 'var(--buy-red)' : (parseFloat(p.diff) < 0 ? 'var(--sell-green)' : 'var(--text-main)');
                document.getElementById('cur-diff').innerText = `${parseFloat(p.diff) > 0 ? '▲' : '▼'} ${Math.abs(p.diff)} (${p.percent}%)`;
                document.getElementById('cur-diff').style.color = color;
                document.getElementById('cur-price').style.color = color;
                document.getElementById('sync-status').innerText = `來源：${p.source}`;
            }
            if (data.tlt) {
                const t = data.tlt;
                document.getElementById('tlt-price').innerText = t.close;
                document.getElementById('tlt-diff').innerText = t.diff;
                document.getElementById('tlt-percent').innerText = t.percent + "%";
                const tColor = parseFloat(t.diff) > 0 ? 'var(--buy-red)' : (parseFloat(t.diff) < 0 ? 'var(--sell-green)' : 'var(--text-main)');
                document.getElementById('tlt-price').style.color = tColor;
            }
            log("✅ 行情同步成功");
        } catch (e) { log("❌ 行情同步失敗"); }
    }

    async function fetchForeignData() {
        const today = new Date();
        const start = new Date(today); start.setDate(today.getDate() - 30);
        const fmt = d => d.toISOString().slice(0, 10);
        const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockShareholding&data_id=7769&start_date=${fmt(start)}&end_date=${fmt(today)}`;
        try {
            const res = await fetch(url);
            const json = await res.json();
            if (json.data && json.data.length > 0) {
                const d = json.data[json.data.length - 1];
                finmindForeign = d;
                document.getElementById('f-ratio').textContent = d.ForeignInvestmentSharesRatio.toFixed(2) + '%';
                document.getElementById('f-shares').textContent = Number(d.ForeignInvestmentShares).toLocaleString() + " 股";
                document.getElementById('f-issued').textContent = Number(d.NumberOfSharesIssued).toLocaleString() + " 股";
                document.getElementById('f-date').textContent = d.date;
                log("✅ 外資數據同步成功");
            }
        } catch (e) { log("❌ 外資抓取失敗"); }
    }

    async function fetchShortSaleData() {
        const today = new Date();
        const start = new Date(today); start.setDate(today.getDate() - 30);
        const fmt = d => d.toISOString().slice(0, 10);
        const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanDailyShortSaleBalances&data_id=7769&start_date=${fmt(start)}&end_date=${fmt(today)}`;
        try {
            const res = await fetch(url);
            const json = await res.json();
            if (json.data && json.data.length > 0) {
                const d = json.data[json.data.length - 1];
                finmindSBL = d;
                document.getElementById('sbl-bal').textContent = Number(d.SBLShortSalesCurrentDayBalance).toLocaleString() + " 股";
                document.getElementById('sbl-sell').textContent = Number(d.SBLShortSalesShortSales).toLocaleString() + " 股";
                document.getElementById('sbl-ret').textContent = Number(d.SBLShortSalesReturns).toLocaleString() + " 股";
                document.getElementById('sbl-date').textContent = d.date;
                log("✅ 借券數據同步成功");
            }
        } catch (e) { log("❌ 借券抓取失敗"); }
    }

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.readAsText(file, 'Big5');
        reader.onload = function(event) {
            const lines = event.target.result.split('\n');
            const brokerMap = {};
            let totalBuy = 0, totalSell = 0;
            lines.forEach(line => {
                const cols = line.replace(/"/g, '').split(',');
                if (cols.length >= 5) processRow(cols[1], cols[3], cols[4], brokerMap, (b,s)=>{totalBuy+=b; totalSell+=s;});
                if (cols.length >= 11) processRow(cols[7], cols[9], cols[10], brokerMap, (b,s)=>{totalBuy+=b; totalSell+=s;});
            });
            const resultArr = Object.keys(brokerMap).map(name => {
                const d = brokerMap[name];
                return { name: name.replace(/^\d{4}\s*/, ''), buy: Math.round(d.buy/1000), sell: Math.round(d.sell/1000), net: Math.round((d.buy-d.sell)/1000) };
            });
            document.getElementById('total-buy').innerText = Math.round(totalBuy/1000);
            document.getElementById('total-sell').innerText = Math.round(totalSell/1000);
            document.getElementById('summary-info').style.display = 'flex';
            currentBuyList = resultArr.filter(i=>i.net>0).sort((a,b)=>b.net-a.net).slice(0,10);
            currentSellList = resultArr.filter(i=>i.net<0).sort((a,b)=>Math.abs(b.net)-Math.abs(a.net)).slice(0,10);
            document.getElementById('buy-body').innerHTML = currentBuyList.map(i=>`<tr><td style="text-align:left; font-weight:500;">${i.name}</td><td style="color:#888; font-size:11px;">${i.buy}/${i.sell}</td><td class="up">${i.net}</td></tr>`).join('');
            document.getElementById('sell-body').innerHTML = currentSellList.map(i=>`<tr><td style="text-align:left; font-weight:500;">${i.name}</td><td style="color:#888; font-size:11px;">${i.buy}/${i.sell}</td><td class="down">${Math.abs(i.net)}</td></tr>`).join('');
            document.getElementById('result').style.display = 'grid';
            updateTextReport();
        };
    });

    function processRow(name, b, s, map, cb) {
        if (!name || name.includes("券商") || name.trim()==="") return;
        if (!map[name]) map[name] = {buy:0, sell:0};
        const bVal = parseFloat(b.replace(/,/g,''))||0, sVal = parseFloat(s.replace(/,/g,''))||0;
        map[name].buy += bVal; map[name].sell += sVal;
        cb(bVal, sVal);
    }

    async function askGemini() {
        const aiBtn = document.getElementById('aiBtn');
        const aiSection = document.getElementById('aiSection');
        const aiContent = document.getElementById('aiContent');
        if (!globalData.price) { alert("請先同步行情數據"); return; }
        aiBtn.innerText = "🤖 思考中...";
        aiBtn.disabled = true;
        aiSection.style.display = "block";
        aiContent.innerText = "正在分析大數據籌碼、借券、外資與美債連動...";
        let sblText = finmindSBL ? `借券餘額 ${Number(finmindSBL.SBLShortSalesCurrentDayBalance).toLocaleString()}股` : "";
        let fText = finmindForeign ? `外資持股比例 ${finmindForeign.ForeignInvestmentSharesRatio}%` : "";
        let tltText = globalData.tlt ? `TLT美債價格 ${globalData.tlt.close} (${globalData.tlt.percent}%)` : "";
        const payload = { price: globalData.price, tltInfo: tltText, creditText: sblText, foreignText: fText, topBuy: currentBuyList.slice(0,3).map(i => i.name).join(', '), topSell: currentSellList.slice(0,3).map(i => i.name).join(', ') };
        try {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();
            aiContent.innerText = result.analysis || "AI 暫時無法回應。";
        } catch (e) { aiContent.innerText = "AI 連線失敗。"; }
        finally { aiBtn.innerText = "🤖 AI 分析"; aiBtn.disabled = false; }
    }

    function updateTextReport() {
        if (!globalData.price) return;
        const p = globalData.price;
        const date = document.getElementById('trade-date').innerText;
        const diff = document.getElementById('cur-diff').innerText;
        const vol = document.getElementById('p-vol').innerText;

        let report = `📊 7769 鴻勁 綜合分析報告\n${date}\n收盤：${p.close} (${diff})\n開盤：${p.open} | 最高：${p.high} | 最低：${p.low}\n成交量：${vol}\n`;
        
        if (globalData.tlt) {
            report += `--------------------\n【全球宏觀】TLT美債：${globalData.tlt.close} (${globalData.tlt.percent}%)\n`;
        }

        if (finmindForeign) {
            report += `--------------------\n【外資持股詳細】(資料日:${finmindForeign.date})\n`;
            report += `外資持股比例：${finmindForeign.ForeignInvestmentSharesRatio.toFixed(2)}%\n`;
            report += `外資持有股數：${Number(finmindForeign.ForeignInvestmentShares).toLocaleString()} 股\n`;
            report += `發行總股數：${Number(finmindForeign.NumberOfSharesIssued).toLocaleString()} 股\n`;
        }
        if (finmindSBL) {
            report += `--------------------\n【借券賣出詳細】(資料日:${finmindSBL.date})\n`;
            report += `當日借券餘額：${Number(finmindSBL.SBLShortSalesCurrentDayBalance).toLocaleString()} 股\n`;
            report += `今日借券賣出：${Number(finmindSBL.SBLShortSalesShortSales).toLocaleString()} 股\n`;
            report += `今日還券股數：${Number(finmindSBL.SBLShortSalesReturns).toLocaleString()} 股\n`;
        }

        if (currentBuyList.length > 0) {
            report += `--------------------\n【買超前十】\n`;
            currentBuyList.forEach((item, idx) => report += `${idx + 1}. ${item.name} (+${item.net}張)\n`);
        }
        if (currentSellList.length > 0) {
            report += `\n【賣超前十】\n`;
            currentSellList.forEach((item, idx) => report += `${idx + 1}. ${item.name} (-${Math.abs(item.net)}張)\n`);
        }
        document.getElementById('textReport').value = report;
    }

    function copyAllLog() {
        const t = document.getElementById('textReport');
        t.select(); document.execCommand('copy'); alert("✅ 報告已複製！");
    }

    async function generatePreview() {
        const btn = document.getElementById('shotBtn'); btn.innerText = "正在產生...";
        try {
            const canvas = await html2canvas(document.querySelector("#captureArea"), { scale: 2, backgroundColor: "#ffffff", useCORS: true });
            document.getElementById('previewImg').src = canvas.toDataURL("image/png");
            document.getElementById('overlay').style.display = "flex";
            btn.innerText = "📸 截圖";
        } catch (err) { alert("截圖失敗"); btn.innerText = "📸 截圖"; }
    }
