<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市場核心監控 Pro v2</title>

<style>
:root {
  --up: #00c853;
  --down: #ff3d00;
  --bg: #000;
  --card: #111;
}

body {
  margin: 0;
  background: var(--bg);
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont;
}

.container {
  max-width: 520px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.card {
  background: var(--card);
  padding: 18px;
  border-radius: 14px;
  border: 1px solid #222;
}

.full {
  grid-column: span 2;
}

.label {
  font-size: 11px;
  color: #666;
  margin-bottom: 8px;
}

.price {
  font-size: 2.2rem;
  font-weight: bold;
}

.change {
  margin-top: 6px;
  font-size: 14px;
}

.up { color: var(--up); }
.down { color: var(--down); }

.cnn {
  font-size: 3rem;
  color: #ff5252;
}
</style>
</head>

<body>
<div class="container">
  <div class="grid">

    <div class="card full">
      <div class="label">CNN 恐慌貪婪</div>
      <div id="cnn" class="cnn">--</div>
      <div id="cnn-label"></div>
    </div>

    <div class="card">
      <div class="label">VIX</div>
      <div id="vix" class="price">--</div>
      <div id="vix-c" class="change"></div>
    </div>

    <div class="card">
      <div class="label">VIX TW</div>
      <div id="vtw" class="price">--</div>
      <div id="vtw-c" class="change"></div>
    </div>

    <div class="card full">
      <div class="label">USD / TWD</div>
      <div id="twd" class="price">--</div>
    </div>

    <div class="card full">
      <div class="label">7769 鴻勁</div>
      <div id="s" class="price">--</div>
      <div id="s-c" class="change"></div>
    </div>

  </div>
</div>

<script>
const API = "https://你的worker網址.workers.dev";

const set = (id, val) => document.getElementById(id).textContent = val;

const render = (id, cId, d) => {
  set(id, d.price.toFixed(2));
  const el = document.getElementById(cId);
  el.textContent = d.change.toFixed(2) + "%";
  el.className = "change " + (d.isUp ? "up" : "down");
};

async function fetchData(path) {
  try {
    const r = await fetch(API + path);
    return await r.json();
  } catch {
    return null;
  }
}

async function update() {
  const cnn = await fetchData("/cnn");
  if (cnn) {
    set("cnn", cnn.price);
    set("cnn-label", cnn.label);
  }

  const vix = await fetchData("/vix");
  if (vix) render("vix", "vix-c", vix);

  const vtw = await fetchData("/vixtw");
  if (vtw) render("vtw", "vtw-c", vtw);

  const twd = await fetchData("/twd");
  if (twd) set("twd", twd.price.toFixed(3));

  const s = await fetchData("/7769");
  if (s) render("s", "s-c", s);
}

update();
setInterval(update, 30000);
</script>
</body>
</html>
