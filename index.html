<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>全球波動率監控</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: #0f0f0f; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .container { max-width: 800px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .card { background: #1a1a1a; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #333; }
    h1 { font-size: 0.9rem; color: #888; margin: 0 0 10px 0; }
    .price { font-size: 2.5rem; font-weight: bold; }
    .vix-us { color: #f0c040; } /* 美股金黃色 */
    .vix-tw { color: #40a0f0; } /* 台股藍色 */
    .time { font-size: 0.75rem; color: #555; margin-top: 8px; }
    canvas { max-width: 800px; width: 100%; background: #1a1a1a; border-radius: 12px; padding: 10px; border: 1px solid #333; }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>CBOE VIX (美股)</h1>
      <div id="p-us" class="price vix-us">--</div>
      <div id="t-us" class="time">載入中...</div>
    </div>

    <div class="card">
      <h1>VIXTWN (台股)</h1>
      <div id="p-tw" class="price vix-tw">--</div>
      <div id="t-tw" class="time">等待數據...</div>
    </div>
  </div>

  <canvas id="vixChart"></canvas>
  
<script>
  const WORKER_URL = "https://dashboard.jou0914.workers.dev";
  const ctx = document.getElementById("vixChart").getContext("2d");

  // 初始化圖表 (僅顯示美股 VIX 歷史)
  const chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: [],
      datasets: [{
        label: "CBOE VIX 歷史軌跡",
        data: [],
        borderColor: "#f0c040",
        backgroundColor: "rgba(240,192,64,0.05)",
        borderWidth: 2,
        tension: 0.3,
        fill: true
      }]
    },
    options: { plugins: { legend: { display: false } } }
  });

  async function fetchData() {
    // 1. 抓取美股 VIX
    try {
      const resUs = await fetch(`${WORKER_URL}/vix`);
      const dataUs = await resUs.json();
      document.getElementById("p-us").textContent = dataUs.price.toFixed(2);
      document.getElementById("t-us").textContent = "更新：" + dataUs.time;
      
      // 更新圖表
      chart.data.labels = dataUs.history.map(d => d.date);
      chart.data.datasets[0].data = dataUs.history.map(d => d.price);
      chart.update();
    } catch (e) { console.error("US VIX Error", e); }

    // 2. 抓取台股 VIX
    try {
      const resTw = await fetch(`${WORKER_URL}/vixtw`);
      const dataTw = await resTw.json();
      document.getElementById("p-tw").textContent = dataTw.price.toFixed(2);
      document.getElementById("t-tw").textContent = "更新：" + dataTw.time;
    } catch (e) { console.error("TW VIX Error", e); }
  }

  fetchData();
</script>
</body>
</html>
